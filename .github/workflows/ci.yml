name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (project + dev tooling)
        run: pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check src
      - name: Mypy
        run: python -m mypy src

  test:
    name: pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: content_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: content_generator
        ports:
          - 5432:5432
        # Wait until Postgres accepts connections before the steps run.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # Catalog tests build a separate `catalog_test` DB from this connection
      # (tests/catalog/conftest.py); other suites use in-memory SQLite.
      DATABASE_URL: postgresql://content_user:ci_password@127.0.0.1:5432/content_generator
      CATALOG_DB: postgres
      # Deterministic, non-secret CI values so app/session import doesn't fall back to
      # the insecure default (production_check would reject these — that's a deploy gate).
      JWT_SECRET_KEY: ci-not-a-real-secret-value-32chars-min
      DISABLE_AUTH: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (project + dev tooling)
        run: pip install -e ".[dev]"
      - name: Migrate content DB (alembic upgrade — also a from-scratch migration smoke)
        run: python -m alembic upgrade head
      - name: Production readiness check
        run: |
          trap 'rm -f .env' EXIT
          cat > .env <<'EOF'
          ENVIRONMENT=production
          DATABASE_URL=postgresql://content_user:ci_password@127.0.0.1:5432/content_generator
          CATALOG_DB=postgres
          JWT_SECRET_KEY=ci-production-check-secret-value-32chars-minimum
          DISABLE_AUTH=false
          AUTH_COOKIE_SECURE=true
          RELOAD=false
          LLM_PROVIDER=polza
          POLZA_AI_API_KEY=ci-dummy-polza-key
          METHODOLOGY_GATE_MODE=observe
          MERMAID_EXPORT_MODE=none
          EOF
          python scripts/production_check.py --production --check-db
      - name: Golden evaluation gate
        run: >
          python scripts/run_evaluation.py
          --dataset evals/golden_projects.example.yaml
          --outputs evals/generated_outputs.example.json
          --out reports/evaluation/golden_ci_report.json
          --strict
          --require-cases 1
      - name: Pytest
        # Skip tests/e2e — it needs a live server + Playwright (opt-in via RUN_E2E) and
        # would fail collection here without the playwright dep.
        run: python -m pytest -q --ignore=tests/e2e
