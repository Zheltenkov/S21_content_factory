introduction: > 
  Это задание является индивидуальным, поэтому выполняй его самостоятельно. Методология «Школы 21» способна приводить к высоким образовательным результатам, только если peer-to-peer оценка производится максимально ответственно. Этот документ призван помочь тебе в этом.

  - Будь доброжелательными, вежливыми. Относись с уважением к другому человеку и проделанной им работе. Будь конструктивен, давая обратную связь.

  - Проверяя работу другого, отмечай для себя спорные и потенциально неверные моменты. Обсуди их с автором решения. Возможно, неправ ты, а не он.

  - Старайся быть открытыми к другому мнению или способу интерпретировать задание. Возможно, и твой подход, и подход другого имеют право на жизнь.

guidelines: >  
  - Подлежат оцениванию только те файлы, которые учащийся или группа выложили в GIT-репозиторий.  

  - В конце чек-листа есть специальные флаги: EMPTY WORK, если репозиторий пустой или решение запушено не в ветку develop, либо ветка develop отсутствует;  CHEAT, если ты уверен, что участник не сам выполнил работу (например, не может объяснить решение). Во всех этих случаях участник получит 0 баллов. В случае отсутствия плагиата мы призываем всё равно продолжить проверку и попытаться вместе с другим учащимся выяснить проблему, приведшую к подобному решению, в управление проектами как нигде важна коллективная работа.

  - Убедись в том, что ты не перепутал, и репозиторий является репозиторием учащегося или группы, которых ты проверяешь.  

  - Если ты сам ещё не закончил работу над заданием, обязательно перечитай его ещё раз перед проверкой.
quick_actions:  
  - EMPTY_WORK
  - CHEATING
  - FORBIDDEN_FUNCTION
  - INVALID_COMPILATION
