introduction: >-
  - Методология «Школы 21» способна приводить к высоким образовательным результатам, только если peer-to-peer оценка производится максимально ответственно. Этот документ призван помочь тебе в этом.

  - Будь доброжелательным, вежливым. Относись с уважением к другому человеку и проделанной им работе. Будь конструктивен, давая обратную связь.

  - Проверяя работу другого, отмечай для себя спорные и потенциально неверные моменты. Обсуди их с автором решения. Возможно, неправ ты, а не он.

  - Старайся быть открытым к другому мнению или способу интерпретировать задание. Возможно, и твой подход, и подход другого — оба имеют право на жизнь.
guidelines: >
  - Подлежат оцениванию только те файлы, которые учащийся или группа выложили в GIT-репозиторий.

  - Убедись в том, что ты ничего не перепутал и репозиторий является репозиторием учащегося или группы, которых ты проверяешь.

  - Если ты сам еще не закончил работу над заданием, обязательно перечитай его еще раз перед проверкой.

  - Ниже ты найдешь специальные теги для разных случаев: отсутствие решения, неработающее решение, плагиат. В этих случаях участник получает 0 баллов. В случае отсутствия плагиата мы призываем все равно продолжить проверку и попытаться вместе с другим учащимся выяснить проблему, приведшую к неработающему решению.

  - Не заканчивай проверку после первого неверно выполненного упражнения, если остальные были выполнены правильно.
quick_actions:
  - EMPTY_WORK
  - INVALID_COMPILATION
  - LEAKS
  - CRASH
  - FORBIDDEN_FUNCTION
  - CHEAT
language: ru
name: Java. T04. Backend
comment: ""
sections:
  - kind: "1"
    name: Предварительное
    description: ""
    questions:
      - name: "Уважай правила:"
        description: >
          - Репозиторий содержит работу пира (или группы).

          - Пир может давать пояснения по работе в любое время во время оценивания.

          - Общие правила соблюдаются на протяжении всей оценки.
        rating: "5"
  - kind: "1"
    name: Главная часть
    description: ""
    questions:
      - name: "Задание 1. Добавление базы данных"
        description: |-
          - Описано подключение к базе данных PostgreSQL в application.properties.
          - Удален класс-хранилище.
          - Добавлены специальные аннотации для классов, которые необходимо сохранять в базу данных.
          - У репозиториев в качестве родителя CrudRepository.
        rating: "6"
      - name: "Задание 2. Добавление авторизации"
        description: |-
          - Добавлены пользователи, у которых есть UUID, логин, пароль.
          - Реализована поддержка пользователей на всех слоях.
          - Создана модель SignUpRequest, у которой есть логин и пароль.
          - Создан сервис авторизации, который использует UserService.
          - У сервиса авторизации есть метод регистрации, который принимает SignUpRequest и возвращает факт успешной регистрации.
          - У сервиса авторизации есть метод авторизации, который принимает в заголовке логин и пароль в виде base64(login:password) и возвращает факт успешной авторизации.
          - Создан контроллер авторизации.
          - У контроллера авторизации есть endpoint для регистрации пользователя.
          - У контроллера авторизации есть endpoint для авторизации  пользователя.
          - Создан класс AuthFilter, сделано наследование от GenericFilterBean и реализован метод doFilter.
          - В методе doFilter класса AuthFilter есть валидация логина и пароля. Если валидация прошла успешно, то выполняется запрос; если валидация прошла с ошибкой, то в ответ добавляется 401 код и запрос не выполняется.
          - Создана Spring Configuration.
          - В Spring Configuration описан Bean для получения SecurityFilterChain.
          - В Spring Configuration разрешен доступ без авторизации к endpoint'ам регистрации и авторизации, а для всех остальных требуется авторизация.
          - В Spring Configuration используется AuthFilter в качестве фильтра.
        rating: "6"
      - name: "Задание 3. Добавление логики игры между двумя игроками"
        description: |-
          - Добавлено состояние для «Ожидание игроков» текущей игры.
          - Добавлено состояние для «Ход игрока с UUID» текущей игры.
          - Добавлено состояние для «Ничья» текущей игры.
          - Добавлено состояние для «Победа игрока с UUID» текущей игры.
          - Добавлена информация о значках, которыми будут ходить пользователи, в текущую игру.
          - Улучшен алгоритм определения окончания игры с использованием состояний.
          - Добавлен endpoint для создания новой игры с пользователем или компьютером.
          - Добавлен endpoint для получения доступных текущих игр.
          - Добавлен endpoint для присоединения пользователя к игре.
          - Улучшен endpoint обновления текущей игры с учетом игры с пользователем или компьютером.
          - Добавлен endpoint для получения текущей игры.
          - Добавлен endpoint для получения информации о пользователе по UUID.
        rating: "6"
      
