name: AP1_Go. Project 01
sections:
  - kind: "1"
    name: Main part
    description: ""
    questions:
      - name: "Задание 1. Консольный калькулятор"
        description: > 
          - Программа считывает левый операнд.
          
          - Программа считывает операцию.
          
          - Программа считывает правый операнд.
          
          - Программа вычисляет нужную операцию и выводит результат в консоль.
          
          - Поддерживаются следующие операции: сложение, вычитание, умножение, деление.
          
          - Точность деления — 3 знака после запятой.
          
          - Перед вводом каждого операнда и операции программа выводит подсказку пользователю.
          
          - Операнды и операция вводятся в консоли через нажатие Enter.
          
          - Операнды имеют тип Float64.
          
          - При вводе некорректных данных программа выводит в stdout текст ошибки (Invalid input) и просит ввести данные снова.
          
          - Test case 1

              > \>Enter left 
              >
              > 3

              > \>Enter operation
              >
              > \+

              > \>Enter right operand
              >
              > 8.15

              > \>Result:
              >
              > \>11.15

          - Test case 2

              > \>Enter left operand
              >
              >  3

              > \>Enter operation
              >
              > mod
              > \>Invalid input

              > \>Enter operation
              >
              > \+

              > >Enter right operand
              >
              > 8.15

              > \>Result:
              >
              > 11.15

        rating: "6"

      - name: "Задание 2. Наиболее часто встречающиеся слова"
        description: > 
          - Программа считывает строку со словами.
          
          - Программа считывает число K, ограничение на количество слов.
          
          - Программа определяет, сколько раз каждое слово встречается в строке.
          
          - Программа сортирует результирующий массив по убыванию и возвращает K первых слов.
          
          - Разделителем для слов является символ пробела.
          
          - Если слов в строке меньше K, то выводится список из всех уникальных слов, отсортированных по их частоте вхождения в строку.
          
          - При вводе пустой строки программа печатает в результате пустую строку.
          
          - Если слова имеют одинаковую частоту, то должны быть отсортированы **лексикографически**.
          
          - Запуск команды go test запускает тесты с проверкой следующих сценариев:
            
            - Поведение с K меньшим, чем количество уникальных слов;
            
            - Передача пустого списка слов;
            
            - Передача списка слов, где K больше, чем число уникальных слов.
        rating: "6"

      - name: "Задание 3. Пересечение срезов"
        description: > 
          - Программа считывает из консоли первый список чисел, разделенных пробелами, завершить нажатие нужно нажатием Enter.
          
          - Программа считывает из консоли второй список чисел, разделенных пробелами, завершить нажатие нужно нажатием Enter.
          
          - Программа работает только с числами типа int.
          
          - Программа находит пересечение 2-х списков и возвращает в том порядке, в котором они встречаются в первом списке.
          
          - Пример:

            - Ввод

              > 5 3 4 2 1 6 \
              > 6 4 2 4

            - Результат:

              > 4 2 6
          
          - Если пересечение пустое, программа выводит текст: «Empty intersection». 
          
          - Если в списке содержатся числа не типа Int, программа выводит ошибку «Invalid input» и завершает свою работу.
        rating: "6"

      - name: "Задание 4. Журнал посещений"
        description: > 
          - Программа в интерактивном консольном режиме ожидает ввода команд.
          
          - Программа считывает операцию **Save**, после которой сохраняет в картотеку ФИО посетителя, специализацию врача, к которому он приходил, и дату визита. Каждый параметр разделяется нажатием Enter.
          
          - Программа считывает операцию **GetHistory**, результатом которой является просмотр истории посещений пациентом больницы. Принимает ФИО пациента и возвращает список из пар — специализация врача и дата визита. Параметры разделяются нажатием Enter.
          
          - Программа считывает операцию **GetLastVisit**, которая позволяет получить последнее посещение пациентом определенного специалиста в больнице. Принимает ФИО пациента и специализацию врача и возвращает дату последнего визита. Параметры разделяются нажатием Enter.
          
          - Если пациент не найден, то программа возвращает ошибку с типом PatientNotFoundError с текстом ошибки «patient not found».
          
          - Программа не поддерживает долгосрочное хранение, при перезапуске программы все данные удаляются.
          
          - Программа завершается после закрытия интерактивного режима в консоли.

        rating: "6"
