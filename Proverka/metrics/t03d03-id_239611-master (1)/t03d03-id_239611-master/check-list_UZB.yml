introduction: >

  School 21ning metodologiyasi, faqatgina o‘zaro bir-biringizni to‘g‘ri baholay olsangizgina katta samaraga ega bo‘lasiz. Baholashni boshlashdan oldin barcha ko‘rsatmalarni diqqat bilan o‘qib chiq.

  - Iltimos, baholash davomidagi barcha muloqotlarda xushmuomala, muloyim, odobli va konstruktiv (ijobiy yondashuvda) bo‘l.

  - Shaxs tomonidan bajarilgan ishning kamchiliklarini ta’kidlab o‘t va uni muhokama, munozara qilish uchun vaqt ajrat.
  
  - Shuni yodda tut, ba’zida vazifalarni talqin qilishda va xususiyatlar ko‘lamida farqlar bo‘lishi mumkin. Iltimos, boshqalarning qarashlarini to‘g‘ri qabul qil.

  - Agar sen hali loyihani tugatmagan bo‘lsang, baholashni boshlashdan oldin ko‘rsatmalarni to‘liq o‘qib chiqishing shart.

guidelines: >

  - Ishtirokchi yoki guruhning GIT omboridagi faqat src papkasidagi fayllarni bahola. 

  - Jamoaviy loyihalarni tekshirishni faqat jamoa to‘liq holatda bo‘lgandagina amalga oshir.

  - Agar ombordagi develop tamog‘ining src papkasida ishtirokchi (yoki jamoa) ishi bo‘lmasa - "bo‘sh loyiha" yoki loyiha ko‘chirilgan taqdirda yoki agar ishtirokchi (yoki jamoa) tekshiruv paytida o‘z ishini tushuntirib bera olmasa "Ko‘chirilgan", shuningdek, quyidagi bandlardan biri bajarilmagan bo‘lsa, hisobot berish uchun nazorat ro‘yxatidagi maxsus nomli bayroqlardan foydalan. Muammollarni keltirib chiqargan sabablarni aniqlash va keyingi tekshiruvlarda ularni oldini olish maqasadida loyihani ko‘rib chiqishni davom ettirish tavsiya etiladi,  faqat ko‘chirish holatlardan tashqari.


