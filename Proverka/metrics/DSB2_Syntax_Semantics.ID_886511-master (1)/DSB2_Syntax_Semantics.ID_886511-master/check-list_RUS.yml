introduction: >
  - Методология «Школы 21» способна приводить к высоким образовательным результатам, только если peer-to-peer оценка производится максимально ответственно. Этот документ призван помочь тебе в этом. Пожалуйста, прочитай его внимательно.

  - Будь доброжелательным, вежливым. Относись с уважением к другому человеку и проделанной им работе. Будь конструктивен, давая обратную связь.

  - Проверяя работу другого, отмечай для себя спорные и потенциально неверные моменты. Обсуди их с автором решения. Возможно, неправ ты, а не он.

  - Старайся быть открытым к другому мнению или способу интерпретировать задание.  Возможно, и твой подход, и подход другого — оба имеют право на жизнь.
guidelines: >
  - Подлежат оцениванию только те файлы, которые учащийся или группа выложили в GIT-репозиторий.

  - Если ты ещё не закончил этот проект сам, перед проверкой обязательно перечитай всю инструкцию.

  - Начинай проверку группового проекта только при полном составе команды.

  - Ниже ты найдешь специальные теги для разных случаев: отсутствие решения, неработающее решение, плагиат. В этих случаях участник получает 0 баллов. В случае отсутствия плагиата мы призываем все равно продолжить проверку и попытаться вместе с другим учащимся выяснить проблему,приведшую к неработающему решению.

  - Дважды проверь, что перед тобой именно репозиторий нужного учащегося или группы.

  - Убедись, что тебя точно не пытались ввести в заблуждение каким бы то ни было способом.

  - В спорных ситуациях помни: чек-лист задаёт лишь общий порядок проверки.  Итоговое решение по оценке остаётся за ревьюером.
quick_actions:
  - EMPTY_WORK
  - CHEAT
language: ru
name: Day01
comment: ""
sections:
  - kind: "1"
    name: Основная часть
    description: ""
    questions:
      - name: Упражнение 00. Типы данных
        description: >
          - Присутствует ли в каталоге репозитория файл data_types.py?

          - Строго ли совпадает вывод с образцом из задания?

          - Не прописан ли вывод явно в коде?

          - Во всех остальных случаях тест считается проваленным.

        rating: "6"

      - name: Упражнение 01. Работа с файлами
        description: >
          - Присутствует ли в каталоге репозитория файл read_and_write.py?

          - Запусти скрипт на приложенном файле ds.csv. Используется ли в выводе разделитель "\t" вместо запятой?

          - Попроси добавить в файл строку со значением, содержащим запятую. Пропускает ли скрипт такую запятую при замене (т.е. не портит данные)?

          - Не прописан ли вывод явно в коде?

        rating: "6"

      - name: Упражнение 02. Поиск по ключу
        description: >
          - Присутствует ли в каталоге репозитория файл stock_prices.py?

          - Если аргумент не передан, ничего ли программа не выводит и корректно ли завершается?

          - Если передана пустая строка, выводит ли программа Unknown company?

          - Если передана некорректная строка (например, lolo), выводит ли программа Unknown company?

          - Выводит ли программа корректную цену акции при валидном названии компании?

          - Проверь то же самое в разных регистрах (lowercase/UPPERCASE).

          - Для получения результата не используется ничего, кроме разрешённых импорта/функций?

          - Не прописан ли вывод явно в коде?

        rating: "6"

      - name: Упражнение 03. Поиск по значению и по ключу
        description: >
          - Присутствует ли в каталоге репозитория файл ticker_symbols.py?

          - Если аргумент не передан, ничего ли программа не выводит и корректно ли завершается?

          - Если передана пустая строка, выводит ли программа Unknown ticker?

          - Если передана некорректная строка (например, pepe), выводит ли программа Unknown ticker?

          - Выводит ли программа корректное название компании и цену акции при валидном тикере?

          - Проверь то же самое в разных регистрах (lowercase/UPPERCASE).

          - Для получения результата не используется ничего, кроме разрешённых импорта/функций?

          - Не прописан ли вывод явно в коде?

        rating: "6"

      - name: Упражнение 04. Словари
        description: >
          - Присутствует ли в каталоге репозитория файл to_dictionary.py?

          - Преобразует ли скрипт список в словарь?

          - Соответствует ли вывод ожидаемому формату?

          - Не прописан ли вывод явно в коде?

          - Во всех остальных случаях тест считается проваленным.

          - Спроси, почему порядок сортировки словаря не обязательно совпадает с примером. (Ответ не влияет на оценку)

        rating: "6"

      - name: Упражнение 05. Поиск по значению или по ключу
        description: >
          - Присутствует ли в каталоге репозитория файл all_stocks.py?

          - Если аргумент не передан, ничего ли программа не выводит и корректно ли завершается?

          - Если передана некорректная строка (например, pepe), выводит ли программа
          pepe is an unknown company or an unknown ticker symbol?

          - Если передан валидный тикер или название компании, показывает ли программа корректно
          название компании или цену акции (строки вида is a ticker symbol for или stock price is)?

          - Корректно ли программа ведёт себя в случаях: валидный тикер, валидное название компании, невалидное имя, две запятые подряд, везде только пробелы?

          - Для получения результата не используется ничего, кроме разрешённых импорта/функций?

          - Не прописан ли вывод явно в коде?

        rating: "6"

      - name: Упражнение 06. Сортировка словаря
        description: >
          - Присутствует ли в каталоге репозитория файл dict_sorter.py?

          - Выводит ли программа названия стран в верном порядке по убыванию чисел?

          - При равных числах показаны ли названия стран в алфавитном порядке?

          - Выводятся ли названия стран по одному в строке, без чисел?

          - Если изменить несколько названий стран и чисел в словаре, остаётся ли вывод корректным?

          - Не прописан ли вывод явно в коде?

        rating: "6"

      - name: Упражнение 07. Множества
        description: >
          - Присутствует ли в каталоге репозитория файл marketing.py?

          - Возвращает ли функция call_center следующий список: ['ted@mosby.com', 'bill_gates@live.com', 'mark@facebook.com', 'elon@paypal.com', 'jessica@gmail.com']?

          - Возвращает ли функция potential_clients следующий список: ['walter@heisenberg.com', 'vasily@mail.ru', 'pinkman@yo.org', 'mr@robot.gov', 'eleven@yahoo.com']?

          - Возвращает ли функция loyalty_program следующий список: ['andrew@gmail.com', 'ted@mosby.com', 'john@snow.is', 'bill_gates@live.com', 'mark@facebook.com']?

          - Если передано неверное название аргумента, выбрасывается ли исключение?

        rating: "6"

      - name: Упражнение 08. Работа со строками как со списками
        description: >
          - Присутствуют ли в каталоге репозитория файлы names_extractor.py и letter_starter.py?

          - Создаёт ли names_extractor.py файл с корректными заголовком и полями? Используется ли в качестве разделителя табуляция?

          - Создаёт ли letter_starter.py текстовый файл с правильным именем адресата из файла?

          - Использует ли скрипт f-строки вместо string.format()?

        rating: "6"

      - name: Упражнение 09. Шифр Цезаря
        description: >
          - Присутствует ли в каталоге репозитория файл caesar.py?

          - Корректно ли кодировщик шифрует заданную строку при указанном сдвиге?

          - Корректно ли декодировщик расшифровывает заданную строку при указанном сдвиге?

          - Не подвергаются ли сдвигу цифры и специальные символы?

          - Для получения результата не используется ничего, кроме разрешённых импорта/функций?

          - При вводе строк с кавычками и без кавычек — сохраняются ли кавычки в результате?

          - При некорректном количестве аргументов показывает ли программа исключение?

          - Не прописан ли вывод явно в коде?

        rating: "6"
