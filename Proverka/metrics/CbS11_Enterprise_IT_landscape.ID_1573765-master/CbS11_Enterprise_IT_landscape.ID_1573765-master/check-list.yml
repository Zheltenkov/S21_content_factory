language: ru
name: CbS11_Enterprise_IT_Landscape
comment: ""
introduction: >-2
    Это задание является индивидуальным, поэтому выполняй его самостоятельно. Проверки в проекте очень важны:

    - Проверки — это не просто формальная сверка ответов с чек-листом, а важнейший этап обучения, где ты можешь обменяться опытом, обсудить сложности и сгенерировать новые подходы к решению. Этот механизм существенно влияет на динамику обучения.

    - Ты сможешь посмотреть на разные варианты решения проекта: проверяя проекты других участников, ты не просто оцениваешь проект, но и активно изучаешь и анализируешь другие варианты решения задачи, обогащая свой опыт.

    - Обсуждение способствует пониманию и усвоению: обсуждая проблемы и сложности в процессе проверки, ты не только сможешь выявить возможные недопонимания, но и с помощью совместного «мозгового штурма» добьешься осознанного подхода к выполнению задания.

    - Задавай уточняющие вопросы, вступай в диалог с пирами. Даже если ты еще не сделал проект, но уже проверяешь его у другого участника, не беспокойся! В таком случае проверяемый должен выступить в роли ментора и подробно объяснить свою работу. Это поможет ему увидеть свое решение с другой стороны и улучшить навыки самопрезентации, а тебе — лучше разобраться в теме.

    - Выявляя ошибки, исправляй их: при обсуждении ошибок не концентрируйся только на их выявлении; лучше ищи способы их исправления и улучшения качества будущих заданий.

    - Не забывай, что твоя главная задача — вести открытую коммуникацию, прислушиваться к тому, как мыслят и учатся другие. Пробуй вместе с другими пирами искать новые смыслы в той теории, которую ты изучил, объясняй остальным те моменты, которые понял лучше всего, делись инструментами, которые помогают тебе эффективно обучаться и познавать новую профессию. Главное — дружелюбие и открытость, ведь все вы идете к одной цели. :) 
guidelines: >-
    - Подлежат оцениванию только те файлы, которые участник или группа выложили в GIT-репозиторий в папку src.

    - Убедись в том, что ты ничего не перепутал, и репозиторий является репозиторием участника или группы, которых ты проверяешь.

    - Если ты сам еще не закончил работу над заданием, обязательно перечитай его еще раз перед проверкой.

    - В конце чек-листа есть специальные флаги: EMPTY WORK, если репозиторий пустой или решение запушено не в папку src ветки develop, либо ветка develop отсутствует; CHEAT, если ты уверен, что участник не сам выполнил работу (например, не может объяснить решение). В случае применения одного из флагов в конце чек-листа проект будет провален. Однако, кроме случаев плагиата, мы призываем все равно продолжить проверку и попытаться вместе с другим учащимся выяснить проблему, которая привела к неработающему решению. 
quick_actions:
  - EMPTY_WORK
  - CHEAT
sections:
  - kind: "1"
    name: "ИТ-инфраструктура предприятия"
    description: ""
    questions:
      - name: "Задание 1. Типовая структура предприятия"
        description: >-
          - В дата-центре сегмент серверов должен быть отдельно от сегмента с базой данных.

          - В офисе пользовательские устройства (МФУ, АРМы) должны быть в отдельном от серверов сегменте.
        rating: "6"
      - name: "Задание 2. Инвентаризация активов"
        description: >-
          - В инвентаризации должно быть следующее:

            - Всего 17 устройств.

            - У одного из коммутаторов L3 должно быть 3 интерфейса (192.168.1.2/24, 192.168.2.1/24, 192.168.4.1/24).

            - У второго коммутатора L3 — 2 интерфейса (192.168.1.3/24, 192.168.3.1/24).

            - Остальные коммутаторы должны быть без IP-адресов.

            - На роутере и коммутаторах L3 установлены ОС: IOS XE (не просто IOS, поскольку, если открыть документацию этих устройств, на них ставится усовершенствованная версия операционной системы IOS).

            - В домене COMPANY находятся все АРМы и контроллер домена.

            - Сетевые адреса должны соответствовать названиям устройств (сверить по схеме), маска везде 255.255.255.0.
            
            - Создана структура таблицы инвентаризации на основе подсказки AI, при этом в ней присутствуют все обязательные столбцы из задания.
            
            - Выявлены и добавлены в таблицу не менее трёх скрытых активов (например, сетевое оборудование, периферия) благодаря анализу AI.
            
            - Загружен и успешно выполнен скрипт проверки корректности инвентаризации, а его работа прокомментирована (какие ошибки AI помог найти).
        rating: "6"
      - name: "Задание 3. Защита предприятия"
        description: >-
          - На схеме должен добавиться сервер VPN (может ставиться ДО firewall, но может быть установлен и внутри ЛВС сразу ПОСЛЕ firewall).

          - На схеме должно добавиться минимум 2 файрвола (один СТРОГО перед двумя управляющими коммутаторами, второй либо перед серверным сегментом, либо перед сегментом рабочих станций).

          - В инвентаризации все добавленные устройства должны быть внесены.

          - В инвентаризации должны быть указаны антивирусы на всех АРМах без исключения.

          - В инвентаризации на серверах с виндой должны быть антивирусы (помимо дефендера), на серверах с линуксом — либо антивирус, либо LSM (AppArmor, SeLinux).
         
          - Добавлено как минимум одно новое СЗИ (не из первоначального списка антивирус/межсетевой), предложенное AI, с указанием против какой угрозы оно работает.
          
          - Обоснован выбор конкретного типа VPN с помощью сравнительного анализа AI, а обоснование записано в отдельный файл.
          
          - Проанализированы слабые места защиты по подсказке AI и исправлен хотя бы один недостаток в итоговой схеме или таблице.
        rating: "6"
  - kind: "2"
    name: "Бонусная часть"
    description: ""
    questions:
      - name: "Задание 4. Дополнительное задание"
        description: >-
          - Новый изолированный сегмент не должен иметь связи с уже имеющимися сетевыми устройствами.

          - Должен появиться минимум 1 фаервол.

          - Должен появиться терминальный сервер.

          - Должен появиться новый VPN-сервер.
        rating: "6"