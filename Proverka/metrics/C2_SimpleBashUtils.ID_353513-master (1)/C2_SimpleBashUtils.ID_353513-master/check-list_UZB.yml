sections:

  - kind: "1"
    name: Asosiy qism
    description: ""
    questions:
      - name: Part_1.CAT
        description: >
          - cat dasturi muvaffaqiyatli ravishda yig’iladi.
          
          - Testlar muvaffaqiyatli ravishda ishga tushadi.
          
          - Testlar bayroqlarning barcha variantlarini (shu jumladan, GNU versiyalarini) va ularga kiritilgan qiymatlarni o'z ichiga oladi. 
          
          - Dastur C11 standartidagi C tilida gcc kompilyatori yordamida ishlab chiqilgan.
          
          - Dastur kodi src papkasida joylashgan.
          
          - Dastur s21_cat maqsadli Makefile bilan yig’ilgan.
          
          - Dastur ishlaydi.
          
          - Dastur tuzilmaviy dasturlash tamoyillari asosida ishlab chiqilgan: dastur fayllar va funksiyalarga ajratilgan, yuqoridan pastga dizaynidan foydalanilgan. Biznes mantig'i va io-topshiriqlar turli funksiyalarga bo'lingan.
          
          - Kod takrorlanishlari mavjud emas.
          
          - Barcha dastur tuzilmalarida (funksiyalar va sikllar) bitta kirish va bitta chiqish mavjud. Xatoli vaziyatlarni hal qilish uchun funksiyalar boshida bir nechta chiqishlarga ruxsat berilgan holatlar bundan mustasno.
          
          - goto iborasi ishlatilmagan.
          
          - Integratsiya testlari ishlab chiqilgan dasturlar natijalarini operatsion tizim tomonidan taqdim etilgan standart natijalar bilan taqqoslaydigan dasturlarni to'liq qamrab oladi.
          
          - Utilitalarning umumiy kodi barcha dasturlar tomonidan ishlatiladigan maxsus modulga joylashtirilgan.
          
          - Kod dekompozitsiyalangan.

          - Dastur bayroqlar bilan va bayroqlarsiz ishlashni qo'llab-quvvatlaydi.

        rating: "6"
