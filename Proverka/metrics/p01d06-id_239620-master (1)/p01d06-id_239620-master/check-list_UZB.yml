sections:
  - kind: "1"
    name: Asosiy qism
    description: ""
    questions:
      - name: 1-qism. Kod.
        description: >-
          - Dastur kodi dekompozitsiyalangan, funksiyalar ajratilgan, “grafika” (“holat”ga qarab) va o‘yin mantig‘i alohida qayta ishlangan.

          - Kodning takrorlanuvchi qismlari yo'q, hammasi funksiyalarga ajratilgan.

          - Har bir funksiyadan faqat bitta chiqish nuqtasi mavjud.

          - Har bir sikldan faqat bitta chiqish nuqtasi mavjud (yoki sikl sarlavhasi orqali yoki break operatori yordamida).

          - Funksiyalar “qatlamlar”ga ajratilgan: “hisoblash” funksiyalari kiritish/chiqarish funksiyalarini bajarmaydi va aksincha.

          - Dinamik xotira ishlatilmagan

          - Massivlar ishlatilmaydi

          - Dasturning boshlang’ich kodi ClangFormat yordamida uslubga moslik uchun tekshirilgan

          - Dasturning boshlang’ich kodi cppcheck yordamida statik tahlil uchun tekshirilgan
        rating: '6'
      - name: 2-qism. Ishlayapti!
        description: >-
          - src/pong.c faylini yaratish gcc kompilyatori yordamida xatosiz yakunlangan.

          - Dastur boshlanadi.

          - Dastur ishlaydi.

          - O'yinda belgilarga asoslangan grafiklardan foydalanilgan.

          - Ekranda (har qanday belgilar yordamida) “raketkalar” (uzunligi 3 belgi), “to‘p” (1 belgi) va o‘yin natijasi ko‘rsatiladi.

          - a-z va k-m tugmalari mos keladigan raketkalarning harakatini vertikal ravishda boshqaradi va bo'sh joy (probel) tugmachasi (agar bosqichma-bosqich rejimi ishlatilsa) harakatni o'tkazib yuboradi.

          - "To'p" o'yin maydoni ichida avtomatik yoki bosqichma-bosqich rejimda harakatlanishi mumkin.
        rating: '6'
      - name: 3-qism. Bu zo’r ishlayapti!
        description: >-
          - Raketka harakatlanayotganda o'yin maydoni chegarasidan tashqariga chiqmaydi.

          - To‘p harakatlanayotganda o‘yin maydoni chegarasidan tashqariga chiqmaydi.

          - O'yin to'pning raketkaning butun yuzasi bilan aloqasini to'g'ri boshqaradi.

          - “To‘p” o‘zini shartli ravishda mukammal elastik to‘qnashuv qonuniga ko‘ra tutadi va “raketkalar” va yuqori va pastki devorlardan sakrab tushadi (zarba burchagi urilib qaytish burchagiga teng).

          - “To‘p” maydonning chap yoki o‘ng chegarasiga o‘tganda hisob “urgan” muallif foydasiga 1 ga o‘zgaradi.

          - Hisob 21 ga yetganda, o'yinchilardan biri g'olib deb e'lon qilinadi va o'yin tugaydi.
        rating: '6'
