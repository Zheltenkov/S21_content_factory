sections:
  - kind: "1"
    name: Main part
    description: ""
    questions:
      - name: "Задание 1"
        description: >-

          1. В папке src есть файл src/chapter_3/removeReps.js.
          
          2. Открой файл removeReps.js

          3. Допиши в коде строчки:  
          'console.log(removeReps([1, 1, 2, 4, 5, 6, 6, 8, 9, 11]))  
          console.log(removeReps([1,1,1,1]))  
          console.log(removeReps([1,2,3,4,5,6]))'  
          
          4. При запуске файла командой 'node removeReps.js' в консоли должны появиться значения: [1,2,4,5,6,8,9,11], [1], [1,2,3,4,5,6].  
        rating: "5"

      - name: "Задание 2"
        description: >-

          1. В папке src есть файл src/chapter_3/removeSymbol.js.
          
          2. Открой файл removeSymbol.js 

          3. Допиши в коде строчки:  
          'console.log(removeString("Большое и интересное сообщение", "о"))   
          console.log(removeString("Hello world!", "z"))  
          console.log(removeString("А роза азора", "А"))' 
          
          4. При запуске файла командой 'node removeSymbol.js' в консоли должны появиться значения: "Бльше и интересне сбщение", "Hello world!", " роза азора". 
        rating: "5"

      - name: "Задание 3"
        description: >-

          1. В папке src есть файл src/chapter_4/counter.js 
          
          2. Открой файл counter.js  

          3. Допиши в коде строчки:    
          'console.log(counter())  
          console.log(counter()) 
          console.log(counter())  
          console.log(counter())' 
          
          4. При запуске файла командой 'node counter.js' в консоли вы должны быть цифры: 0, 3, 6, 9.    
        rating: "5"

      - name: "Задание 4"
        description: >-
          1. В папке src есть файл src/chapter_4/calculator.js. 
          
          2. Открой файл calculator.js.  

          3. Допиши в коде строчки:  
          'console.log(one(mult(three(plus(four()))))) - 2 балла
          console.log(four()) - 1 балл
          console.log(five(mult(three())))' - 2 балла  
          
          4. При запуске файла командой 'node calculator.js' в консоли должны быть цифры: 7, 4, 15.   
        rating: "6"

      - name: "Задание 5"
        description: >-

          1. В папке src есть файл src/chapter_4/paskalsTriangle.js.
          
          2. Открой файл paskalsTriangle.js 

          3. Допиши в коде строчки:  
          'console.log(paskalsTriangle(3,2)) 
          console.log(paskalsTriangle(5,4)) 
          console.log(paskalsTriangle(1,1))'  
          
          4. При запуске файла командой 'node paskalsTriangle.js' в консоли должны быть цифры: 3, 5, 1.  
        rating: "5"

      - name: "Задание 6"
        description: >-
        
          1. В папке src есть файл src/chapter_4/fibonachi.js.
          
          2. Открой файл fibonachi.js

          3. Допиши в коде строчки:  
          'console.log(fibo(5))  
          console.log(fibo(8))  
          console.log(fibo(21)'   
          
          4. При запуске файла командой 'node fibonachi.js' в консоли должны быть цифры: 8, 34, 17711. 
        rating: "5"

      - name: "Задание 7"
        description: >-

          1. В папке src есть файл src/chapter_4/atm.js.
          
          2. Открой файл atm.js 

          3. Допиши в коде строчки:  
          'console.log(atm(8350)) - 3 балла    
          console.log(atm(2570)) - 1 балл  
          console.log(atm(100050))' 1 балл 
          
          4. При запуске файла командой 'node atm.js' в консоли должны быть значения: {'50': 1,'100': 1,'200': 1,'500': 0,'1000': 1,'2000': 1,'5000': 1}, "Incorrect value", "Limit exceeded".  
        rating: "5"

      - name: "Задание 8"
        description: >-

          1. В папке src есть файл src/chapter_4/wordSearch.js.
          
          2. Открой файл wordSearch.js  

          3. Допиши в коде строчки:  
          console.log(searchSubString(examplePuzzle, "like"))  
          console.log(searchSubString(examplePuzzle, "gold")) 
          console.log(searchSubString(examplePuzzle, "queen"))  
          console.log(searchSubString(examplePuzzle, "cake"))  
          console.log(searchSubString(examplePuzzle, "socks")' 
          
          4. При запуске файла командой 'node wordSearch.js' в консоли должны быть значения: true,true,true,true,false.   
        rating: "5"
  - kind: "2"
    name: Bonus part
    description: ""
    questions:
      - name: "Задание 9"
        description: >-

          1. В папке src есть файл src/chapter_4/sudoku.js.  
          
          2. Открой файл sudoku.js.  

          3.  Присутствует реализация метода "prettyBoard".

          3. Допиши в коде строчки:  
          'console.log(prettyBoard("1-58-2----9--764-52--4--819-19--73-6762-83-9-----61-5---76---3-43--2-5-16--3-89--")) - 2 балла  
          console.log(prettyBoard("---6891--8------2915------84-3----5-2----5----9-24-8-1-847--91-5------6--6-41----")) - 2 балла 
          console.log(prettyBoard("---------------------------------------------------------------------------------"))' - 1 балл
          
          4. При запуске файла командой 'node sudoku.js' проверь, решает ли программа судоку 1 уровня (1 запуск консоли), 2 уровня (2 запуск) и 3 уровня.    
        rating: "6"
