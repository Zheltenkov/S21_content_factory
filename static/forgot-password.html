<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 Восстановление пароля - Генератор учебных проектов</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/auth-light.css?v=20260508-polish-ui">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔑 Восстановление пароля</h1>
            <p>Введите email для получения ссылки</p>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <form id="forgotForm" onsubmit="handleForgotPassword(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    autocomplete="email"
                    placeholder="Введите ваш email"
                    aria-required="true"
                    aria-invalid="false"
                    aria-describedby="email-error"
                >
                <span id="email-error" class="error-message" role="alert" aria-live="polite" style="display: none;"></span>
            </div>
            
            <button type="submit" class="btn" id="forgotBtn">Отправить ссылку</button>
            
            <div class="auth-actions center">
                <a href="/" class="auth-link">Вернуться к входу</a>
            </div>
        </form>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        const API_URL = `${API_BASE}/api/v1`;
        
        async function handleForgotPassword(event) {
            event.preventDefault();
            
            const btn = document.getElementById('forgotBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const email = document.getElementById('email').value.trim();
            
            // Валидация email
            const emailError = document.getElementById('email-error');
            const emailField = document.getElementById('email');
            let hasErrors = false;
            
            if (!email) {
                emailField.setAttribute('aria-invalid', 'true');
                emailField.classList.add('field-error');
                emailError.textContent = 'Пожалуйста, введите email';
                emailError.style.display = 'block';
                hasErrors = true;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                emailField.setAttribute('aria-invalid', 'true');
                emailField.classList.add('field-error');
                emailError.textContent = 'Введите корректный email адрес';
                emailError.style.display = 'block';
                hasErrors = true;
            } else {
                emailField.setAttribute('aria-invalid', 'false');
                emailField.classList.remove('field-error');
                emailError.textContent = '';
                emailError.style.display = 'none';
            }
            
            if (hasErrors) {
                return;
            }
            
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            btn.disabled = true;
            btn.textContent = 'Отправка...';
            
            try {
                const response = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email
                    })
                });
                
                // Всегда показываем успех для безопасности (даже если email не найден)
                successMsg.textContent = 'Если аккаунт с таким email существует, на него отправлена ссылка для восстановления пароля.';
                successMsg.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Отправить ссылку';
                
            } catch (error) {
                console.error('Ошибка:', error);
                showError('Ошибка при отправке запроса. Попробуйте еще раз.');
                btn.disabled = false;
                btn.textContent = 'Отправить ссылку';
            }
        }
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
        }
    </script>
</body>
</html>
