# Production stack for the S21 Content Factory pilot.
# nginx (TLS termination) stays on the host and proxies to app on 127.0.0.1:8000.
#
#   cd /opt/s21_content_factory
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# The server .env lives at repo root (/opt/s21_content_factory/.env) and is NOT committed.
services:
  db:
    image: postgres:16
    container_name: cf-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-content_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-content_generator}
    volumes:
      - cf_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-content_user} -d ${POSTGRES_DB:-content_generator}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cf-app
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - cf_appdata:/data

volumes:
  cf_pgdata:
  cf_appdata:
