# S21 Content Factory — host nginx, TLS termination (self-signed for the IP pilot).
# Install to /etc/nginx/conf.d/cf.conf, remove any old default site, `nginx -t && systemctl reload nginx`.

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name sch21gen.aeza.network 77.110.123.227 _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sch21gen.aeza.network 77.110.123.227 _;

    ssl_certificate     /etc/ssl/certs/cf-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/cf-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 500M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # App builds Secure cookies; tell it the browser hop is HTTPS.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Generation is long-running (multi-step LLM); keep the upstream alive.
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_connect_timeout 75s;
    }
}
