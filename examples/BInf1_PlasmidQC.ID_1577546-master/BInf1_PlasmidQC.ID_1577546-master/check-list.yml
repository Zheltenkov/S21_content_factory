introduction: |-
  - Проверка — это не формальность, а часть твоего обучения. Здесь можно обменяться опытом, обсудить сложные моменты и даже придумать новые подходы к решению задач.
  - Проверяя проекты других участников, ты не просто ставишь «галочки» — ты изучаешь разные варианты решений и расширяешь необходимую специалисту насмотренность.
  - Даже если твой проект еще не готов — ты можешь проводить проверку. Те, чьи работы ты проверяешь, могут выступить в роли ментора и объяснить свою логику. Это поможет им лучше понять свою работу, а тебе — разобраться в теме.
  - Критика — это здорово, но главное — предложить способы улучшения. Так ты сделаешь проект лучше и поможешь коллеге расти — а это очень важный навык для работы в команде.
  - После проверки заданий по чек-листу выбери 2–3 вопроса из списка ниже, которые ты хочешь обсудить во время встречи.
    - Про сложности: «Что в этом проекте было самым сложным для тебя? Каким образом это удалось решить? Может, какой-то неочевидный способ?»
    - Про успехи: «А что, наоборот, получилось хорошо? Почему именно это? Как этот подход можно использовать в других проектах?»
    - Про улучшения: «Если бы сейчас пришлось снова сделать этот проект, что можно было бы сделать по-другому? Почему?»
    - Про поиск информации: «Где тебе приходилось искать ответы на возникающие вопросы? Какой ресурс или способ оказался самым полезным? Как ты убеждаешься в том, что информация из выбранного источника точная?»
  - Используй по максимуму эту встречу как возможность глубже разобраться в теме и найти новые подходы к решениям.
quick_actions:
  - EMPTY_WORK
  - CHEAT
language: ru
guidelines: |-
  - Подлежат оцениванию только те файлы, которые выложены в GIT-репозиторий в папку src.
  - Убедись в том, что репозиторий является репозиторием участника или группы, которых ты проверяешь.
  - Если ты еще работаешь над проектом, и он не готов, обязательно перечитай его еще раз перед проверкой.
  - В конце чек-листа есть специальные флаги: EMPTY WORK, если репозиторий пустой или решение запушено не в папку src ветки develop, либо ветка develop отсутствует; CHEAT, если ты видишь признаки того, что участник не самостоятельно выполнил работу (например, не может объяснить решение). В случае применения одного из флагов в конце чек-листа проект будет провален. Однако, кроме случаев плагиата, рекомендуем все равно продолжить проверку и попытаться вместе выяснить проблему, которая привела к неработающему решению.

sections:
  - kind: "1"
    name: Задание 1. Оценка качества секвенирования
    description: ""
    questions:
      - name: "Шаг 1"
        description: |-
          Проверь структуру папок — все папки созданы:

          - project1
            - results
            - data
            - script
        rating: "5"
      - name: "Шаг 2"
        description: |-
          Проверь папку data — присутствуют файлы «пациентов» с расширением .fastq.
        rating: "5"
      - name: "Шаг 3"
        description: |-
          В папке results найди файл отчета анализа секвенирования `FastQC 1.3.html`. Файл есть и назван корректно (в соответствии с Шагом и подШагом задания 1.3).
        rating: "5"
      - name: "Шаг 4"
        description: |-
          Открой файл у себя на компьютере. Проверь, какие критичные проблемы (красный статус) нашлись при анализе в FastQC:

            - Basic Statistics. 
            - Per base sequence quality. 
            - Per tile sequence quality. 
            - Per sequence quality scores.
            - **Per base sequence content — верно.**
            - Per sequence GC content. 
            - Per base N content. 
            - Sequence length distribution. 
            - **Sequence duplication levels — верно.**
            - Overrepresented sequence. 
            - **Adapter content — верно.**

          Проверь найденные критичные проблемы, которые требуют внимания (оранжевый статус)?

            - Basic Statistics. 
            - Per base sequence quality. 
            - Per tile sequence quality. 
            - Per sequence quality scores.
            - Per base sequence content. 
            - **Per sequence GC content — верно.**
            - Per base N content. 
            - Sequence length distribution. 
            - Sequence duplication levels. 
            - **Overrepresented sequence — верно.**
            - Adapter content. 

          Критерии оценки:

            - 5 баллов — все 5 проблем указаны верно. 
            - 4 балла — верно указано 4 проблемы. 
            - 3 балла — верно указаны 3 проблемы. 
            - 2 балла — верно указаны 2 проблемы. 
            - 1 балл — верно указана 1 проблема (или весь список представленных проблем отмечены как верные).
        rating: "6"
      - name: "Шаг 5"
        description: |-
          Открой файл отчета анализа секвенирования `FastQC 1.3.html`. Изучи информацию о чистоте по адаптерам (график в соответствующем разделе) отчет по Overrepresented sequences. Какие названия адаптеров встречаются в отчете? 

          Критерии оценки:

            - 5 баллов — в ответе перечислены все ключевые адаптеры (основной список):
              - TrueSeq Adapter Index 2.
              - Универсальные адаптеры Illumina.
              - polyA.
            - 4 балла — указаны 2 адаптера из списка выше.
            - 3 балла — указан 1 адаптер из основного списка (из основного списка) + дополнительные адаптеры (не из списка).
            - 2 балла — указан только 1 адаптер из основного списка (TrueSeq Adapter Index 2, универсальные адаптеры Illumina или polyA).
            - 1 балл — адаптеры не указаны.
        rating: "6"
  - kind: "1"
    name: Задание 2. Улучшение качества секвенирования
    description: ""
    questions:
      - name: "Шаг 1"
        description: |-
          Открой папку data. В ней есть файл, содержащий адаптеры (формат .fa). 
        rating: "5"
      - name: "Шаг 2"
        description: |-
          Открой папку results. В ней есть файл после очистки программой Trimmomatic (`2.1.fastq` или `2.2.fastq`). 
        rating: "5"
      - name: "Шаг 3"
        description: |-
          Открой папку results. В ней есть файл отчета FastQC (данных секвенирования, очищенных с помощью Trimmomatic от адаптеров). 
        rating: "5"
      - name: "Шаг 4"
        description: |-
          Очистились ли адаптеры? 
        rating: "5"
      - name: "Шаг 5"
        description: |-
          Проверь, какие критичные проблемы (красный статус) согласно файлу отчета FastQC (на очищенных с помощью Trimmomatic от адаптеров данных секвенирования) были выявлены: 

            - Basic Statistics. 
            - Per base sequence quality. 
            - Per tile sequence quality. 
            - Per sequence quality scores.
            - **Per base sequence content — верно.**
            - Per sequence GC content.
            - Per base N content.
            - Sequence length distribution. 
            - **Sequence duplication levels — верно.**
            - Overrepresented sequence.
            - Adapter content.

          Критерии оценки: 

            - 5 баллов — верно указаны обе проблемы. 
            - 4 балла — указаны обе критичные проблемы, а также 1 или более из требующих внимания (Per sequence GC content, Sequence length distribution, Overrepresented sequence). 
            - 3 балла — указана одна критическая проблема и 1 или более из требующих внимания (Per sequence GC content, Sequence length distribution, Overrepresented sequence). 
            - 2 балла — указана только одна критическая проблема. 
            - 1 балл — критичные проблемы не указаны. 
        rating: "6"
      - name: "Шаг 6"
        description: |-
          Оцени ответ твоего коллеги-пира на вопрос: 
          «Почему изменилось распределение длины чтений?»

          Критерии оценки:

            - 5 баллов — ответ подробно объясняет причины изменения распределения длины чтений и полностью соответствует базовым принципам секвенирования. Приведен логичный пример, включающий описание влияния Trimmomatic (обрезка адаптеров и низкокачественных участков), а также объяснение, почему именно такое распределение наблюдается после обработки.
            - 4 балла — в ответе есть объяснение влияния обрезки адаптеров Trimmomatic на распределение длины чтений, без логических ошибок, но пир не раскрывает причин изменения распределения в общем или не объясняет механизмы глубоко.
            - 3 балла — в ответе упомянуты обрезка и/или причины изменения распределения, но объяснение недостаточно ясное, плохо структурированное или требует значительных догадок для понимания логики.
            - 2 балла — в ответе есть информация об обрезке и/или причинах появления распределения, но допускает серьезные логические ошибки или путаницу в причинах изменения распределения.  
            - 1 балл — ответ не отвечает на вопрос, почему изменилось распределение длины чтений. 
        rating: "6"
      - name: "Шаг 7"
        description: |-
          Открой в папке results файл `2.5.html` — проверь, что данный файл есть в папке. 
        rating: "5"
      - name: "Шаг 8"
        description: |-
          Изучи файл `2.5.html` и оцени ответ твоего коллеги-пира на вопрос: 
          «Опиши выбранные тобой параметры. Почему выбор был именно таким? Получилось ли улучшить отчет (да/нет) и почему?».

          Критерии оценки

            - 5 баллов — в ответе подробно описано, какие были выбраны стандартные параметры и почему. Логика ответа согласуется с рекомендациями мануала. Объяснено, какие изменения произошли в отчете FastQC и как именно на это повлияли параметры.
            - 4 балла — в ответе описаны выбранные стандартные параметры. Логика ответа согласуется с рекомендациями мануала. Есть обоснование, но не полностью раскрыто или отсутствует объяснение выбора нестандартных, но допустимых параметров. Объяснено, какие изменения произошли в отчете FastQC и как именно на это повлияли параметры.
            - 3 балла — приведены нестандартные, но технически допустимые параметры без обоснования выбора. Объяснено, какие изменения произошли в отчете FastQC и как именно на это повлияли параметры, однако ответ неполный. 
            - 2 балла — описаны нестандартные параметры, без объяснения их выбора. Объяснено, какие изменения произошли в отчете FastQC и как именно на это повлияли параметры, однако ответ некорректен, так как использовались избыточные параметры, способные навредить последующей работе с чтениями.
            - 1 балл — ответ не отвечает на вопрос и не содержит описания параметров. 
        rating: "6"
  - kind: "1"
    name: Задание 3. Оценка GC-состава
    description: ""
    questions:
      - name: "Шаг 1"
        description: |-
          Открой папку script — в ней есть скрипт по подсчету GC-состава в двух разных векторах pUC19. 
        rating: "5"
      - name: "Шаг 2"
        description: |-
          Проверь папку data. В ней есть файлы fasta1 и fasta2. Файлы соответствуют последовательностям [fasta1](https://www.ncbi.nlm.nih.gov/nuccore/6691170) и [fasta2](https://www.ncbi.nlm.nih.gov/nuccore/MT856194.1).
        rating: "5"
      - name: "Шаг 3"
        description: |-
          Запусти скрипт из папки script для последовательностей fasta1 и fasta2. Содержание GC для fasta1 составляет 50,63%.
        rating: "5"
      - name: "Шаг 4"
        description: |-
          Содержание GC для fasta2 составляет 44,87%.
        rating: "5"
      - name: "Шаг 5"
        description: |-
          Оцени ответ твоего коллеги-пира на вопрос: 
          «Вспомни, какой эталонный GC-состав вектора pUC19? Сравни с получившимися значениями. Как ты думаешь, есть ли разница и почему?».

          Критерии оценки

            - 5 баллов — в ответе проанализирована вся доступная информация, позволяющая дать ответ на вопрос об отличии GC-состава. Приведено обоснование разницы. Ответ логичен и содержит понятные сравнения.   
            - 4 балла — в ответе проанализирована вся доступная информация, позволяющая дать ответ на вопрос об отличии GC-состава. Однако обоснование разницы не достаточное. 
            - 3 балла — в ответе отмечено лишь одно обоснование разницы, однако приведено как именно оно влияет на GC-состав. 
            - 2 балла — в ответе по большей части имеются неверные шагы, однако ответ содержит хотя бы один верный тезис.
            - 1 балл — ответ неверный или не связан с вопросом.

        rating: "5"