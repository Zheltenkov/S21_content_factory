introduction: |-
  - Проверка — это не формальность, а часть твоего обучения. Здесь можно обменяться опытом, обсудить сложные моменты и даже придумать новые подходы к решению задач.
  - Проверяя проекты других участников, ты не просто ставишь «галочки» — ты изучаешь разные варианты решений и расширяешь необходимую специалисту насмотренность.
  - Даже если твой проект еще не готов — ты можешь проводить проверку. Те, чьи работы ты проверяешь, могут выступить в роли ментора и объяснить свою логику. Это поможет им лучше понять свою работу, а тебе — разобраться в теме.
  - Критика — это здорово, но главное — предложить способы улучшения. Так ты сделаешь проект лучше и поможешь коллеге расти — а это очень важный навык для работы в команде.
  - После проверки заданий по чек-листу выбери 2–3 вопроса из списка ниже, которые ты хочешь обсудить во время встречи.
    - Про сложности: «Что в этом проекте было самым сложным для тебя? Каким образом это удалось решить? Может, какой-то неочевидный способ?»
    - Про успехи: «А что, наоборот, получилось хорошо? Почему именно это? Как этот подход можно использовать в других проектах?»
    - Про улучшения: «Если бы сейчас пришлось снова сделать этот проект, что можно было бы сделать по-другому? Почему?»
    - Про поиск информации: «Где тебе приходилось искать ответы на возникающие вопросы? Какой ресурс или способ оказался самым полезным? Как ты убеждаешься в том, что информация из выбранного источника точная?»
  - Используй по максимуму эту встречу как возможность глубже разобраться в теме и найти новые подходы к решениям.

quick_actions:
  - EMPTY_WORK
  - CHEAT

language: ru

guidelines: |-
  - Подлежат оцениванию только те файлы, которые выложены в GIT-репозиторий в папку src.
  - Убедись в том, что репозиторий является репозиторием участника или группы, которых ты проверяешь.
  - Если ты еще работаешь над проектом, и он не готов, обязательно перечитай его еще раз перед проверкой.
  - В конце чек-листа есть специальные флаги: EMPTY WORK, если репозиторий пустой или решение запушено не в папку src ветки develop, либо ветка develop отсутствует; CHEAT, если ты видишь признаки того, что участник не самостоятельно выполнил работу (например, не может объяснить решение). В случае применения одного из флагов в конце чек-листа проект будет провален. Однако, кроме случаев плагиата, рекомендуем все равно продолжить проверку и попытаться вместе выяснить проблему, которая привела к неработающему решению.

sections:
  - kind: "1"
    name: "Основная часть"
    description: ""
    questions:
      - name: "Задание 1. Роли в команде"
        description: |- 
          - По ссылке из документа открывается страница/таблица с названием «Роли в команде».
          - В таблице рассмотрено 7 ролей: CEO, Product manager, Dev (full stack), Product Design, Marketing manager App, Product owner, Project manager.
          - Для каждой роли заполнены 2 колонки:
            - зона ответственности (за что отвечает?);
            - ожидания от продакт-менеджера в рамках фичи «Ежедневные уроки со streak».
            - Пример корректного заполнения:
              - CEO «Петя»: ожидания описаны с бизнес-контекстом (запуск через 3 недели, питч для инвесторов, фича как Duolingo).  
              - «Саша» (Developer): упомянуты потребность в ТЗ, ожидания четких задач по конкретным технологиям React Native/Node.js.  
              - «Катя» (Product Design): указаны инструменты Figma и фокус на пользовательских сценариях.  
              - «Дима» (App Marketing): потребности связаны с каналами продвижения: Яндекс.Директ/ASO, ожидания фичи для креативов.  
              - Product Manager (ты): роль раскрыта через взаимодействие: описана зона ответственности, и как взаимодействует с другими ролями.
              - Product Owner vs Product Manager: описаны как разные роли с разными функциями (если обе присутствуют в таблице).
              - Project Manager: отделен от PM (фокус на сроках/ресурсах vs продуктовые решения).
            - Ожидания от продакт-менеджера для каждой роли должны быть конкретными и привязанными к фиче «ежедневные уроки со streak» (не общие фразы).

          - Всё выполнено в одном документе (Notion / Google Sheets).
          - Таблица читабельная: правильная структура, понятные формулировки.
          - Логика распределения ролей соответствует контексту команды (5 человек, хаос в ожиданиях).
          - Пир может объяснить своими словами разницу между ролями PM / PO / Project Manager и привести примеры взаимодействия в продукте.
          - Задай вопрос пиру и обсудите ответ: «Основываясь на анализе исследований, какой один тренд или изменение в роли PM тебя удивили больше всего?»
          - Уточни, удалось ли пиру начать создавать базу знаний полезных материалов. Если да, попроси поделиться названием 1–2 ресурсов (для твоей базы знаний).
        rating: "6"

      - name: "Задание 2. Классификация продукта и выбор фичи"
        description: |- 
          - По ссылке из документа открывается таблица «Модели монетизации» в том же документе из Задания 1 (Notion / Google Sheets).
          - В таблице рассмотрено минимум 5 моделей (например,Subscription, Freemium, Transaction, Usage-based, Hybrid, API и т. д.).  
          - По каждой модели заполнены ячейки: Суть, Плюсы,  Минусы, Примеры компаний, Топ-3 метрики.

          <img src="https://git.21-school.ru/masters/PM1_PMStarterPack.ID_1577958/-/raw/master/tests/task2_1.png"/>

          - Модель Freemium выбрана как наиболее подходящая модель монетизации для продукта.
          - Аргументы выбора Freemium учитывают контекст: бесплатные базовые уроки, премиум без рекламы + контент.
          - По ссылке из документа открывается таблица «Выбор фичи».
          - Рассмотрены все 5 фич: Streak, геймификация, оффлайн, push, социалка.
          - Для каждой фичи заполнены 4 колонки:
            - Название фичи.
            - Соответствие продукту (учитывая метрики: 5k MAU, D1 25%, премиум 3%).
            - Сложность внедрения.
            - Приоритет.
          - Выбрана фича «Ежедневные уроки со streak» для первого спринта.
          - Обоснование выбора связано с: давлением CEO («как Duolingo»), низким retention 25%, целью формирования привычки.
          - Логика классификации Freemium корректна для мобильного EdTech-приложения.
          - Логика выбора «Ежедневные уроки со streak» соответствует бизнес-контексту и метрикам.

          <img src="https://git.21-school.ru/masters/PM1_PMStarterPack.ID_1577958/-/raw/master/tests/task2_2.png"/>

          - После того как вы посмотрели все таблицы, спроси пира и обсудите вместе:
            - Почему остальные четыре фичи (геймификация, оффлайн-доступ, push-уведомления, социалка) менее приоритетны для самого первого спринта? 
            - Какую фичу по приоритету пир взял бы в работу далее и почему?
        rating: "6"

      - name: "Задание 3. Жизненный цикл продукта"
        description: |- 
          - По ссылке из документа открывается доска в Miro (или на другой аналогичной платформе) с названием, связанным с проектом (LinguaDaily, фича streak и т. д.).
          - Нарисована схема жизненного цикла с 4 этапами: Idea → MVP/MLP → Scaling → Support.
            - Схема целостная и читабельная (понятно, что показывает).
            - Для каждого этапа кратко подписана основная задача (например: Idea — проверка гипотез, MVP/MLP — поиск PMF).
            - На схеме жизненного цикла продукта визуально выделена текущая стадия Early MVP/MLP (цветом, рамкой, иконкой).
            - Под блоком текущей стадии перечислено 2–3 ключевых риска (например: отсутствие PMF, нестабильные метрики D1= 25%, ограниченные ресурсы).
            - Для каждого из 4 этапов жизненного цикла  по одному по одному ключевому типу взаимодействия продакт-менеджера со стейкхолдерами:
              - Idea: Продакт <—> CEO (согласование видения, целей).
              - MVP/MLP: Продакт <—> Dev/Дизайн (ТЗ, приоритеты бэклога).
              - Scaling: Продакт <—>  Пользователи/Маркетинг (feedback, метрики роста).
              - Support: Продакт <—> Support/Operations (инциденты, улучшения).
            - Взаимодействия визуально отображены (стрелки, подписи, иконки типа Продакт <—> CEO).

          - Корректный контекст описания задач для каждого этапа:

          <img src="https://git.21-school.ru/masters/PM1_PMStarterPack.ID_1577958/-/raw/master/tests/task_3.png"/>

          - Логика рисков соответствует стадии Early MVP (метрики 5k MAU, D1 25%).
          - Взаимодействия PM конкретны и связаны с этапом + стейкхолдерами из контекста (CEO — «Петя», «Саша» — dev, «Катя» — дизайн, «Дима» — маркетинг).
          - Пир может объяснить свой процесс с исследованием основных задач каждой из фаз жизненного цикла продукта, поделиться, какие источники были использованы для выполнения этого задания (сайты, литература, форумы и т. д.). 
          - Пир может обосновать свой вывод, почему продукт находится на стадии Early MVP.
        rating: "6"

      - name: "Задание 4. Первый бэклог"
        description: |- 
          - По ссылке из документа открывается проект/доска в Trello/Notion (или на другой аналогичной платформе) .
          - На доске настроены 5 колонок: Backlog → To Do → In Progress → Testing → Done.
          - В бэклоге отражено 8 задач: 3 дизайн + 3 разработка + 2 тестирование.
            - Дизайн (3 задачи) учитывает streak-механику:
              - экран «ежедневный урок» + визуальный счетчик streak (огонек 🔥 + число дней);
              - состояния «streak продолжается» / «streak прерван»;
              - элементы напоминаний/баннеров для мотивации.
            - Разработка (3 задачи) покрывает логику streak:
              - подсчет дней (что считается «днем», когда растет/обнуляется);
              - хранение и отображение streak в интерфейсе;
              - настройка уведомлений (push/in-app).
            - Тестирование (2 задачи) проверяет ключевые сценарии:
              - streak растет при ежедневном уроке, сбрасывается при пропуске;
              - напоминания работают корректно (разные временные сценарии).
          - В топ-3 задач первого спринта входят:
            - дизайн экрана урока + streak;
            - логика подсчета streak;
            - базовое тестирование сценария «streak растет».
          - Критерий приоритета обоснован: первый инкремент мотивирует вернуться завтра.
          - Задачи сформулированы конкретно (из описания задачи понятно, что будет сделано, как это поддерживает привычку).
          - Логика декомпозиции задач соответствует механике streak (не просто «добавить экран»).
          - Распределение ролей опирается на роли команды из Задания 1.
          - Пир может описать свой процесс выбора топ-3 задач на спринт, аргументировать, почему именно выбранные задачи позволяют за спринт создать фичу, которая дает «ощущение streak».
          - Пир может рассказать, с какими трудностями пришлось столкнуться при корректном формулировании задач для команды и что помогло корректно формулировать задачи в итоге. 
        rating: "6"

      - name: "Задание 5. Фиксация договоренностей"
        description: |- 
          - По ссылке из документа открывается страница в Notion (или на другой аналогичной платформе) с названием «Kick-off фичи: Ежедневные уроки со streak» или «Meet».
          - Страница читабельная и служит «точкой правды» по фиче.
          - Есть структура страницы с блоками/заголовками:
            - Цели фичи.
            - Стейкхолдеры и их ожидания (указаны СЕО, маркетолог, разработка).
            - Scope первой версии.
            - Риски и допущения.
            - План коммуникации.
          - Все ожидания, scope, риски конкретно привязаны к фиче «Ежедневные уроки со streak».
          - Логика рисков соответствует контексту (давление CEO, маленькая команда 5 человек).
          - * Задай вопрос пиру и обсудите идеи пира: «Какие ты видишь риски в работе с стейкхолдерами, и как ты планируешь их митигировать?»
          - Направление логики заполнения блоков: 

          <img src="https://git.21-school.ru/masters/PM1_PMStarterPack.ID_1577958/-/raw/master/tests/task_5.png"/>

        rating: "6"