# Дидактические дименшены для оценки сгенерированного контента жюри-моделью.
#
# Это конфигурируемый набор (стартовая гипотеза из прототипа). В проде методолог
# может подменить его, задав путь к своему файлу через переменную окружения
# DIDACTIC_DIMENSIONS_PATH; при отсутствии/ошибке используется этот встроенный набор.
# Каждый дименшен: id (стабильный ключ), title (заголовок), question (вопрос судье).
schema_version: 1
dimensions:
  - id: coherence
    title: Связность
    question: Единый маршрут без разрывов, оборванных фраз и скачков?
  - id: scaffolding
    title: Scaffolding (теория готовит к практике)
    question: Теория главы 2 реально готовит к заданиям главы 3?
  - id: example_quality
    title: Качество примеров
    question: Примеры конкретны и раскрывают идею, а не заглушки?
  - id: cognitive_load
    title: Когнитивная нагрузка
    question: Нет повторов и перегруза, адекватная прогрессия?
  - id: school_tone
    title: Тон школы (p2p)
    question: "Peer-тон: не директивно, решение не выдаётся?"
  - id: naturalness
    title: Не-AI-водность
    question: Живой язык без шаблонных самоповторов?
