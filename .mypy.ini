[mypy]
python_version = 3.12
plugins = pydantic.mypy
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
ignore_missing_imports = True

# Shared core (platform/) is the highest-value code — every LLM call, config
# and DB access flows through it. Hold it to a stricter typing bar than the
# legacy packages so regressions in the core are caught and new code must be
# typed. Widen this to other packages incrementally.
[mypy-content_factory.platform.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

# API layer (routers, services, db, middleware) is the second-highest-value
# surface after platform/. Held to the same strict bar; models use SQLAlchemy
# 2.0 Mapped[] so instance attributes type natively (no plugin needed).
[mypy-content_factory.api.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

# Audit engine (checkers, corpus evaluation, exporters). Enum-heavy scoring
# code; strict typing catches Criterion/Severity/Verdict mismatches and the
# None-handling around optional model clients.
[mypy-content_factory.audit.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-chromadb.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-duckduckgo_search.*]
ignore_missing_imports = True

[mypy-slowapi.*]
ignore_missing_imports = True

