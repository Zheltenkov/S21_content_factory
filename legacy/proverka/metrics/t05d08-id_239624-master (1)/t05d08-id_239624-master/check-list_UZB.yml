introduction: >

  School 21 metodologiyasi qachonki tenga-teng tekshiruvlar jiddiy ravishda olib borilsagina o’z ma’nosiga ega bo’ladi. Iltimos tekshiruvni boshlashdan oldin barcha ko’rsatmalarni diqqat bilan o’qing. 

  - Iltimos, baholash davomidagi barcha muloqotlarda xushmuomala, muloyim, odobli va konstruktiv (ijobiy yondashuvda) bo‘l.

  - Shaxs tomonidan bajarilgan ishning kamchiliklarini ta’kidlab o‘t va uni muhokama, munozara qilish uchun vaqt ajrat.
  
  - Shuni yodda tut, ba’zida vazifalarni talqin qilishda va xususiyatlar ko‘lamida farqlar bo‘lishi mumkin. Iltimos, boshqalarning qarashlarini to‘g‘ri qabul qil.

  - Agar sen hali loyihani tugatmagan bo‘lsang, baholashni boshlashdan oldin ko‘rsatmalarni to‘liq o‘qib chiqishing shart.

guidelines: >

  - Faqat talaba yoki jamoaning GIT omboridagi src papkasidagi fayllarni baholang.

  - Jamoa loyihasini ko'rib chiqishni faqat jamoa to'liq tarkibda ishtirok etganda boshlashni ta'minlang.

  - Quyidagilar haqida xabar berish uchun nazorat roʻyxatidagi maxsus bayroqchalardan foydalaning, masalan, agar omborda develop tarmog’ining src papkasida talaba (yoki jamoa)ning ishi boʻlmasa, “boʻsh loyiha” yoki ko’chirilgan taqdirda yoki agar talaba (yoki jamoa) ko'rib chiqish paytida istalgan vaqtda o'z ishini tushuntira olmasa, shuningdek, quyidagi bandlardan biri bajarilmasa, “ko’chirilgan”. Biroq, ko’chirish holatlaridan tashqari, keyingi ko'rib chiqishda ularning oldini olish uchun vaziyatni keltirib chiqargan muammolarni aniqlash uchun loyihani ko'rib chiqishni davom ettirish tavsiya etiladi.

  - GIT ombori talaba yoki jamoa omboriga mos kelishini ikki marta tekshiring.

  - Sizni chalg’itish uchun hech qanday zararli narsa ishlatilmaganligini diqqat bilan tekshiring.

  - Bahsli holatlarda, nazorat ro'yxati faqat tekshirishning umumiy tartibini belgilashini unutmang. Loyihani baholash bo'yicha yakuniy qaror tekshiruvchida qoladi.mbordagi develop tamog‘ining src papkasida ishtirokchi (yoki jamoa) ishi bo‘lmasa - "bo‘sh loyiha" yoki loyiha ko‘chirilgan taqdirda yoki agar ishtirokchi (yoki jamoa) tekshiruv paytida o‘z ishini tushuntirib bera olmasa "Ko‘chirilgan", shuningdek, quyidagi bandlardan biri bajarilmagan bo‘lsa, hisobot berish uchun nazorat ro‘yxatidagi maxsus nomli bayroqlardan foydalan. Muammollarni keltirib chiqargan sabablarni aniqlash va keyingi tekshiruvlarda ularni oldini olish maqasadida loyihani ko‘rib chiqishni davom ettirish tavsiya etiladi,  faqat ko‘chirish holatlardan tashqari.

