    questions:
      - name: Задание 00 — Audit of incoming inserts
        description: >
          Проверь наличие файла day09_ex00.sql

          - SQL-скрипт выглядит так, как показано ниже.

                CREATE TABLE person_audit 
                (created timestamp WITH TIME ZONE NOT NULL DEFAULT CURRENT_TIMESTAMP,
                type_event char(1) NOT NULL DEFAULT 'I',
                row_id bigint NOT NULL,
                name varchar, 
                age integer, 
                gender varchar, 
                address varchar, 
                CONSTRAINT ch_type_event CHECK (type_event IN ('I','U','D'))
                );

          - SQL-код для триггерной функции


                CREATE OR REPLACE FUNCTION fnc_trg_person_insert_audit( )
                RETURNS TRIGGER AS
                $BODY$
                BEGIN
                INSERT INTO person_audit(created, type_event, row_id, name, age, gender, address)
                VALUES(current_timestamp,'I', NEW.id, NEW.name, NEW.age, NEW.gender, NEW.address);
                RETURN NULL;
                END;
                $BODY$
                LANGUAGE plpgsql;

          - SQL-код триггера

                CREATE  TRIGGER trg_person_insert_audit
                AFTER    INSERT ON person FOR EACH ROW
                EXECUTE FUNCTION  fnc_trg_person_insert_audit( );

          - SQL-запрос для проверки

                SELECT * FROM person_audit

          - Результат SQL

                "2022-03-21 20:27:40.283551 +00:00"	"I"	"10"	"Damir"	"22"	"male"	"Irkutsk"

        rating: "5"

