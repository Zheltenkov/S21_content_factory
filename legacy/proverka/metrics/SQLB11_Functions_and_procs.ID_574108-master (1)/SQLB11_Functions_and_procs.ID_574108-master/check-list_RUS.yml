      - name: Задание 06 — Function like a function-wrapper
        description: >
          Проверь наличие файла day09_ex06.sql

          - SQL-скрипт выглядит так, как показано ниже.

                    CREATE FUNCTION fnc_person_visits_and_eats_on_date(pperson varchar default 'Dmitriy', 
                    pprice numeric default 500, pdate date default '2022-01-08')
                    RETURNS TABLE(name    varchar) AS $$
                    BEGIN
                    RETURN QUERY
                        select p.name as pizzeria_name
                        from menu inner join pizzeria p on p.id = menu.pizzeria_id
                            inner join person_visits pv on menu.pizzeria_id = pv.pizzeria_id
                            inner join person p2 on p2.id = pv.person_id
                        where price  < pprice and p2.name = pperson and visit_date = pdate;
                    END;
                    $$ LANGUAGE PLPGSQL;

          - SQL-запрос для проверки

                SELECT * FROM fnc_person_visits_and_eats_on_date(pprice := 800);

          - Результат SQL

                "Papa Johns"
                "DoDo Pizza"

          - SQL-запрос для проверки

                SELECT *
                FROM fnc_person_visits_and_eats_on_date(pperson := 'Anna',pprice := 1300,pdate := '2022-01-01');          

          - Результат SQL

                "Pizza Hut"
                "Pizza Hut"
                "Pizza Hut"
                "Pizza Hut"

        rating: "5"
                 
      - name: Задание 07 — Different view to find a Minimum
        description: >
          Проверь наличие файла day09_ex07.sql

          - SQL-скрипт выглядит так, как показано ниже.

                    CREATE FUNCTION func_minimum(VARIADIC arr NUMERIC[ ])
                    RETURNS NUMERIC AS
                    $$
                    SELECT min( i ) FROM unnest(arr) g( i );
                    $$ LANGUAGE SQL;

          - SQL-запрос для проверки

                SELECT func_minimum(VARIADIC arr => ARRAY[10.0, -1.0, 5.0, 4.4]);

          - Результат SQL

                "-1"

        rating: "5"                

      - name: Задание 08 — Fibonacci algorithm is in a function
        description: >
          Проверь наличие файла day09_ex08.sql

          - SQL-скрипт выглядит так, как показано ниже.

                    CREATE OR REPLACE FUNCTION fnc_fibonacci(pstop integer default 10)
                    RETURNS TABLE(a    bigint) AS $$
                    WITH RECURSIVE f (a,b) AS
                    (SELECT 0 AS a, 1 AS b
                    UNION ALL
                    SELECT b, a+b FROM f WHERE b<pstop)
                    SELECT a
                    FROM f;
                    $$ LANGUAGE SQL;

          - SQL-запрос для проверки

                SELECT * FROM fnc_fibonacci(20)

          - Результат SQL

                "0"  
                "1"
                "1"
                "2"
                "3"
                "5"
                "8"
                "13"

        rating: "5"                
