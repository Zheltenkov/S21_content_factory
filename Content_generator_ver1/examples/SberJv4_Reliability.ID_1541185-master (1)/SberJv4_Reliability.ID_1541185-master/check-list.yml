introduction: |-
  -  Проверка — это не формальность, а часть твоего обучения. Здесь можно обменяться опытом, обсудить сложные моменты и даже придумать новые подходы к решению задач.

  - Проверяя проекты других участников, ты не просто ставишь "галочки" — ты изучаешь разные варианты решений и расширяешь необходимую специалисту насмотренность. 

  - Даже если твой проект еще не готов — ты можешь проводить проверку. Те, чьи работы ты проверяешь, могут выступить в роли ментора и объяснить свою логику. Это поможет им лучше понять свою работу, а тебе — разобраться в теме.

  - Критика — это здорово, но главное — предложить способы улучшения. Так ты сделаешь проект лучше и поможешь коллеге расти - а это очень важный навык для работы в команде.

  - После проверки заданий по чек-листу выбери 2-3 вопроса из списка ниже, которые ты хочешь обсудить во время встречи. 

    1\. Про сложности:

      "Что в этом проекте было самым сложным для тебя? 
      Каким образом это удалось решить? Может, какой-то неочевидный способ?"   

    2\. Про успехи:

      "А что, наоборот, получилось хорошо? Почему именно это? Как этот подход можно использовать в других проектах?"

    3\. Про улучшения:

      "Если бы сейчас пришлось снова сделать этот проект, что можно было бы сделать по-другому? Почему?"   

    4\. Про поиск информации:
  
      "Где тебе приходилось искать ответы на возникающие вопросы? Какой ресурс или способ оказался самым полезным? Как ты убеждаешься в том, что информация из выбранного источника точная?"

  - Используй по максимуму эту встречу как возможность глубже разобраться в теме и найти новые подходы к решениям.
guidelines: >-
  - Подлежат оцениванию только те файлы, которые выложены в GIT-репозиторий в папку src.

  - Убедись в том, что репозиторий является репозиторием участника или группы, которых ты проверяешь.

  - Если ты еще работаешь над проектом, и он не готов, обязательно перечитай его еще раз перед проверкой. 
    
  - В конце чек-листа есть специальные флаги: EMPTY WORK, если репозиторий пустой или решение запушено не в папку src ветки develop, либо ветка develop отсутствует; CHEAT, если ты видишь признаки того, что участник не самостоятельно выполнил работу (например, не может объяснить решение). В случае применения одного из флагов в конце чек-листа проект будет провален. Однако, кроме случаев плагиата, рекомендуем все равно продолжить проверку и попытаться вместе выяснить проблему, которая привела к неработающему решению.
quick_actions:
  - EMPTY_WORK
  - INVALID_COMPILATION
  - LEAKS
  - CRASH
  - FORBIDDEN_FUNCTION
  - CHEAT
language: ru
name: Project Reliability
comment: ""
sections:
  - kind: "1"
    name: Главная часть
    description: ""
    questions:
      - name: "Задание 0.Тестовый бизнес-сервис"
        description: |-
          - Каждый слой является отдельным пакетом
          - Структура проекта имеет как минимум следующие слои: web, adapter
          - Создан один controller с методом для получения списка игр
          - Создано 2 адаптера для сервиса рекомендаций и сервиса игр
          - Создана заглушка для вызовов http клиента, запросы http клиента отправляются в заглушку.
          - Создан интеграционный тест, проверяющий вызов метода контроллера по http и получение ответа с использованием http client. В тесте есть assert для проверки результата вызова
        rating: "5"
      - name: "Задание 1. Оптимальное использование памяти"
        description: |-
          - В проекте сохранена IDEA Run Configuration. В конфигурации установлено ограничение используемой памяти через параметр JVM XX:MaxRAMPercentage
          - Выясни, с помощью какой утилиты пир проверял, что ограничение установлено
          - Спроси у пира контрольные вопросы из задания "ВОПРОСЫ, КОТОРЫЕ ТОЧНО ЗАДАСТ ТВОЙ ТИМЛИД"
          - Какие способы установки максимального размера heap существуют?
          - Что лучше использовать - указание абсолютных или относительных значений?
          - Как указать ограничение heap для Java процесса?
          - Как проверить, что ограничение установлено?

        rating: "6"
      - name: "Задание 2. Пул потоков"
        description: |-
          - В проекте существует файл настроек Spring Boot (application.yml или application.properties) и там установлены параметры для управления потоками server.tomcat: threads.max, threads.min-spare, accept-count
          - В корне проекта сохранена конфигурация для запуска утилиты нагрузочного тестирования
          - Выясни, как пир проверял количество рабочих потоков 
          - Спроси у пира контрольные вопросы из задания "ВОПРОСЫ, КОТОРЫЕ ТОЧНО ЗАДАСТ ТВОЙ ТИМЛИД"
          - Для чего нужен пул потоков? Чем он лучше простого создания потоков по необходимости?
          - Как настроить число потоков, обрабатывающих входящие запросы, в Tomcat?
          - Что происходит с потоками, когда нет входящих запросов?
          - Что происходит с потоками, когда число входящих запросов превышает число потоков в пуле?
          - Как выяснить оптимальное число потоков? Какие факторы на это влияют?

        rating: "6"
      - name: "Задание 3. Обработка ошибок"
        description: |-
          - В контроллере создан отдельный метод выбрасывающий исключение
          - В настройках Spring Boot установлены такие параметры для обработки исключений server.error: include-exception, include-stacktrace и include-message
          - Спроси у пира контрольные вопросы из задания "ВОПРОСЫ, КОТОРЫЕ ТОЧНО ЗАДАСТ ТВОЙ ТИМЛИД"
          - Почему потребитель нашего API не должен видеть имя исключения и stacktrace?
          - Как мы можем передать информацию об ошибке, возникшей при обработке запроса к нашему API, потребителю?
          - Какие средства для обработки ошибок предоставляет Spring Framework?

        rating: "6"
      - name: "Задание 4. Timeouts"
        description: |-
          - Для http client, использующихся в обоих адаптерах, настраиваются connection и request timeouts
          - В настройках Spring Boot установлены оба таймаута
          - Заглушка, используемая в проекте, умеет эмулировать таймаут
          - В проекте есть интеграционный тест, проверяющий получение таймаута, тест успешно выполняется
          - Спроси у пира контрольные вопросы из задания "ВОПРОСЫ, КОТОРЫЕ ТОЧНО ЗАДАСТ ТВОЙ ТИМЛИД"
          - Чем отличается connection timeout от request timeout?
          - К чему может привести ситуация, когда таймаут очень большой или что еще хуже - не ограничен?
          - Как настроить таймауты для выбранного вами ранее http client?
          - Можно ли настроить таймаут для endpoint? Где это лучше сделать - в самом сервисе или на прокси-сервере перед ним?
          - Как должны соотносится таймаут для входящего запроса к твоему сервису и таймауты на запросы к сервисам, поставщикам данных?
          - Подумай, как определить оптимальную величину таймаута? Предупреждение: однозначного ответа на этот вопрос нет.

        rating: "6"
      - name: "Задание 5. Rate Limiter"
        description: |-
          - В проекте подключена библиотека, реализующая функционал Rate Limiter
          - Ограничение Rate Limiter установлено на метод контроллера, возвращающий список игр
          - В проекте есть интеграционный тест, проверяющий срабатывание Rate Limiter
          - В настройках Spring Boot установлены как минимум такие параметры Rate Limiter: период обновления лимита и значение лимита
          - Спроси у пира контрольные вопросы из задания "ВОПРОСЫ, КОТОРЫЕ ТОЧНО ЗАДАСТ ТВОЙ ТИМЛИД" 
          - Для чего нужен Rate Limiter?
          - Почему лучше "отбить" часть запросов клиентов, чем попытаться обработать все?
          - Предположим, Rate Limiter настроен с периодом 1 секунда и rate равным 10. Рассмотрим интервал 2 секунды. Пусть за последние 100 мс первой секунды к нам пришло 10 запросов, и в первые 100 мс второй секунды - тоже 10 запросов. Как отработает Rate Limiter? В каком случае мы можем пропустить такой всплеск запросов, в каком - должны отбить?
          - Как настроить Rate Limiter, если у нас максимально допустимая частота запросов 0.2 запроса в секунду?
          - Какой код ошибок HTTP используется для возврата ошибки клиенту при срабатывании Rate Limiter?
          - Предположим, вы предоставляете внешнее API с помощью API шлюза, который расположен перед вашим приложением. Где лучше разместить Rate Limiter? Плюсы и минусы обоих вариантов?
          - В каких еще случаях, кроме защиты от перегрузки сервера, может быть полезен Rate Limiter ?

        rating: "6"
      - name: "Задание 6. Circuit Breaker"
        description: |-
          - В проекте подключена библиотека, реализующая функционал Circuit Breaker
          - Circuit Breaker включен в методе адаптера, возвращающего список рекомендаций
          - Заглушка умеет эмулировать ошибочные ответы сервиса рекомендаций
          - В проекте есть интеграционный тест, проверяющий срабатывание Circuit Breaker
          - В настройках Spring Boot установлены как минимум такие параметры Circuit Breaker: порог срабатывания, интервал для расчета порога срабатывания и время ожидания в открытом состоянии
          - Спроси у пира контрольные вопросы из задания "ВОПРОСЫ, КОТОРЫЕ ТОЧНО ЗАДАСТ ТВОЙ ТИМЛИД"
          - Для чего нужен Circuit Breaker? Почему этот паттерн так назвали?
          - Как работает Circuit Breaker?
          - Как обработать ситуацию, когда запрос не был отправлен к поставщику данных из-за срабатывания Circuit Breaker?
          - Как подобрать подходящие параметры Circuit Breaker?
          - Что будет, если мы установим слишком маленький порог срабатывания? Или слишком маленькое время ожидания?
          - Как лучше выставлять порог срабатывания - абсолютное значение или относительное?


        rating: "6"
      - name: "Задание 7. Retry"
        description: |-
          - В проекте подключена библиотека, реализующая функционал Retry
          - Retry включен в методе адаптера, возвращающего список рекомендаций
          - Заглушка умеет эмулировать последовательность из нескольких ошибок и успешного ответа
          - В проекте есть интеграционный тест, проверяющий срабатывание Retry и успешный ответ в итоге
          - В настройках Spring Boot установлены как минимум такие параметры Retry: число повторов, пауза между повторами
          - Спроси у пира контрольные вопросы из задания "ВОПРОСЫ, КОТОРЫЕ ТОЧНО ЗАДАСТ ТВОЙ ТИМЛИД"
          - Для чего нужен Retry?
          - Какие параметры мы можем настроить для алгоритма повторов?
          - Что такое exponential backoff? Сравните его с обычным повтором
          - Как выбрать минимальный интервал для начала повторов?
          - Почему важно ограничить число попыток?
          - При всех ли ошибках стоит использовать Retry? 403 forbidden? 429 Too Many Requests?

        rating: "6"
      - name: "Задание 8. Fallback"
        description: |-
          - В проекте реализован возврат фиксированного списка рекомендаций как Fallback при ошибке вызова адаптера сервиса рекомендаций
          - В проекте есть интеграционный тест, проверяющий срабатывание Fallback
          - В настройках Spring Boot установлены параметры Fallback: настройки ответа, рубильник для включения Fallback
          - Спроси у пира контрольные вопросы из задания "ВОПРОСЫ, КОТОРЫЕ ТОЧНО ЗАДАСТ ТВОЙ ТИМЛИД"
          - Для чего нужен Fallback?
          - Что можно вернуть клиенту при отсутствии актуальных данных?
          - В каких случаях нельзя вернуть клиенту альтернативный содержательный ответ вместо ошибки?

        rating: "6"
      - name: "Задание 9. Cache"
        description: |-
          - В проекте подключена библиотека, реализующая функционал кэширования
          - Ответы сервиса игр кэшируются с помощью функционала кэширования Spring Boot (@Cacheable)
          - Заглушка умеет эмулировать последовательность из успешного ответа и нескольких ошибок
          - В проекте есть интеграционный тест, проверяющий получение данных из кэша при неработающем сервисе игр
          - В настройках Spring Boot установлены как минимум такие параметры кэширования: размер кэша, время жизни кэша
          - Спроси у пира контрольные вопросы из задания "ВОПРОСЫ, КОТОРЫЕ ТОЧНО ЗАДАСТ ТВОЙ ТИМЛИД"
          - Для чего нужно кэширование?
          - Какие риски несет кэширование? Как бороться с этими рисками?
          - Какие данные стоит кэшировать? Рекомендации? Курс валют? Цену на товар?
          - Как связано кэширование с реализацией паттерна Fallback?
          - В чем разница между локальным и распределенным кэшом? В чем их плюсы и минусы?
          - От чего зависит величина TTL (Time To Live) для записи в кэше?
        rating: "6"