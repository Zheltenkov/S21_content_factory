          - The tests cover all methods.
          
          - AssertAll is used correctly in all tests.
          
          - Assertions include error descriptions.
          
          - Tests avoid redundancy.          
          
          - The repository contains files labeled manual-solution (manual implementation) and ai-assisted-solution (AI-assisted implementation).
          
          - The peer can describe their experience using AI in the assignment by answering the following questions:
              - What variants for the test annotation did the AI suggest?
              - Which variant did you choose and why?
              - Did you need to edit the AI's suggestions?

          
          Evaluation criteria:
          
          - For every 2 unmet requirements, deduct 1 point.

          - Missing files labeled manual-solution — minus 4 points (the task is not considered to have been completed correctly).
