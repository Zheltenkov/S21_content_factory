introduction: >
  Project review is not just a formality — it's part of your learning:

  - It's an opportunity to exchange experiences, discuss challenging aspects, and even come up with new approaches to solving problems.

  - When reviewing other participants' projects, you're not just ticking boxes — you're exploring different solutions and developing the critical eye every specialist needs.

  - Even if your own project isn't ready yet, you can still conduct reviews. Those whose work you review may act as mentors, explaining their thought process. This helps them better understand their own work — and helps you grasp the topic more deeply.

  - It is ok to criticize, but what really matters is suggesting ways to improve. This makes the project better and helps your peers grow — an essential skill for teamwork.

  - After reviewing the tasks against the checklist, choose 2-3 questions from the list below to discuss during the meeting:

  - About challenges: "What was the most difficult part of this project for you? How did you solve it? Maybe in some unexpected way?"

  - About successes: "What worked particularly well? Why do you think that was? How could this approach be applied to other projects?"

  - About improvements: "If you had to do this project again now, what would you do differently? Why?"

  - About research: "Where did you look for answers to your questions? Which resource or method was the most helpful? How do you verify the accuracy of the information from your chosen source?"

  - Make the most of this meeting — use it as a chance to dive deeper into the topic and discover new problem-solving approaches.

guidelines: >-
  - Only the files uploaded to the GIT repository in the src folder will be evaluated.
  
  - Make sure the repository belongs to the participant or group you are reviewing.
  
  - If you're still working on the project and it's not ready, be sure to review it again before the evaluation.
  
  - At the end of the checklist, there are special flags: EMPTY WORK (empty repo/incorrect branch) or CHEAT (if you suspect the participant did not complete the work independently (e.g., cannot explain their solution). If either flag is applied at the end of the checklist, the project will be marked as failed. However, we encourage continuing the review to troubleshoot issues together.

quick_actions:
  - EMPTY_WORK
  - CHEAT
