introduction: >-
  - Проверка — это не формальность, а часть твоего обучения. Здесь можно
  обменяться опытом, обсудить сложные моменты и даже придумать новые подходы к
  решению задач.

  - Проверяя проекты других участников, ты не просто ставишь «галочки» — ты изучаешь разные варианты решений и расширяешь необходимую специалисту насмотренность. 

  - Даже если твой проект еще не готов — ты можешь проводить проверку. Те, чьи работы ты проверяешь, могут выступить в роли ментора и объяснить свою логику. Это поможет им лучше понять свою работу, а тебе — разобраться в теме.

  - Критика — это здорово, но главное — предложить способы улучшения. Так ты сделаешь проект лучше и поможешь коллеге расти — а это очень важный навык для работы в команде.

  - После проверки заданий по чек-листу выбери 2–3 вопроса из списка ниже, которые ты хочешь обсудить во время встречи. 

  1. Про сложности:

  «Что в этом проекте было самым сложным для тебя? Каким образом это удалось решить? Может, какой-то неочевидный способ?»   

  2. Про успехи:

  «А что, наоборот, получилось хорошо? Почему именно это? Как этот подход можно использовать в других проектах?»

  3. Про улучшения:

  «Если бы сейчас пришлось снова сделать этот проект, что можно было бы сделать по-другому? Почему?»   

  4. Про поиск информации:
  
  «Где тебе приходилось искать ответы на возникающие вопросы? Какой ресурс или способ оказался самым полезным? Как ты убеждаешься в том, что информация из выбранного источника точная?»

  - Используй по максимуму эту встречу как возможность глубже разобраться в теме и найти новые подходы к решениям.
guidelines: >-
  - Подлежат оцениванию только те файлы, которые выложены в GIT-репозиторий в
  папку src.

  - Убедись в том, что репозиторий является репозиторием участника или группы, которых ты проверяешь.

  - Если ты еще работаешь над проектом и он не готов, обязательно перечитай его еще раз перед проверкой. 
    
  - В конце чек-листа есть специальные флаги: EMPTY WORK, если репозиторий пустой или решение запушено не в папку src ветки develop, либо ветка develop отсутствует; CHEAT, если ты видишь признаки того, что участник не самостоятельно выполнил работу (например, не может объяснить решение). В случае применения одного из флагов в конце чек-листа проект будет провален. Однако, кроме случаев плагиата, рекомендуем все равно продолжить проверку и попытаться вместе выяснить проблему, которая привела к неработающему решению.
quick_actions:
  - EMPTY_WORK
  - CHEAT
language: ru
name: AQA1_Basics
comment: ""
sections:
  - kind: "1"
    name: Main part
    description: ""
    questions:
      - name: Задание 1. Первое знакомство с JUnit
        description: |-
          - Код написан на языке программирования Java версии 21 или выше.
          - Код написан согласно принципам Clean Code.
          - Тесты находятся в пакете src/test, а код, в свою очередь, в src/main.
          - Над тестами описана аннотация Displayname с читаемым названием, верно передающим то, что происходит в тесте.
          - Тесты написаны для всех методов.
          - AssertAll применено во всех тестах верно.
          - Во всех асcершенах присутствуют текстовые описания ошибок.
          - В тестах нет избыточности (нет нескольких тестов, приводящих к одному типу результата).
          - В репозитории присутствуют файлы с пометками manual-solution (ручная реализация) и ai-assisted-solution (реализация с ИИ)
          - Пир может описать свой опыт использования ИИ в задании ответить на вопросы:
            - Какие варианты для аннотации к тесту предложил ИИ?
            - Какой вариант ты выбрал/а и почему?
            - Пришлось ли тебе редактировать предложения ИИ?

          - Критерии оценивания:
            - Каждые 2 несоблюденных требования — минус один балл.
            - Отсутствие файлов с пометкой `manual-solution` - минус 4 балла (задание не считается выполненным корректно)
        rating: "6"

      - name: Задание 2. Параметризация тестов в JUnit
        description: |-
          - Код написан на языке программирования Java версии 21 или выше.
          - Код написан согласно принципам Clean Code.
          - Тесты находятся в пакете src/test, а код, в свою очередь, в src/main.
          - Над тестами описана аннотация Displayname с читаемым названием, верно передающим то, что происходит в тесте.
          - Оба теста имеют читабельные названия, описывающие суть их действий.
          - В первом тесте наличествуют обе основных проверки: валидности имени(более трех букв) и валидности возраста (больше 18 лет), а также проверка на невалидность строки в целом (как минимум на то, что в ней не более двух последовательностей символов, разделенных пробелом).
          - Во втором тесте в наличии валидная проверка на полиндром (должна быть описана циклом).
          - В обоих тестах строка, принимаемая на вход, обрабатывается методом .trim().
          - В методе, являющимся methodSource для второго теста, присутствуют как тесты положительные, так и отрицательные.
          - В репозитории присутствуют файлы с пометками manual-solution (ручная реализация) и ai-assisted-solution (реализация с ИИ)
          - Пир может описать свой опыт использования ИИ в задании ответить на вопросы:
            - Чем отличаются твой набор и набор ИИ?
            - Какие тестовые случаи ИИ пропустил, а какие добавил лишние?
            - Какой набор ты выберешь для финальной версии теста и почему?

          - Критерии оценивания:
            - Каждые 2 несоблюденных требования — минус один балл.
            - Отсутствие файлов с пометкой `manual-solution` - минус 4 балла (задание не считается выполненным корректно)
        rating: "6"

      - name: Задание 3. Последовательность выполнения тестов в JUnit
        description: |-
          - Код написан на языке программирования Java версии 21 или выше.
          - Код написан согласно принципам Clean Code.
          - Тесты находятся в пакете src/test, а код, в свою очередь, в src/main.
          - Над тестами описана аннотация Displayname с читаемым названием, верно передающим то, что происходит в тесте.
          - Порядок исполнения тестов соблюден: тест is1shouldBeThird аннотирован первым/нулевым по порядку, после него идет is2shouldBeFirst, далее is3shouldBeSecond.
          - Над тестовым классом объявлен в соответствующей аннотации TestMethodOrderer.class.
          - В тестовом классе присутствуют методы BeforeAll и AfterAll, выводящие в консоль фразы: «Сейчас автотесты будут запущены в верном порядке» и «Спасибо за внимание!» соответственно.
          - Критерии оценивания:    
            - Каждое несоблюденное требование — минус один балл.
        rating: "6"

      - name: Задание 4. Сьюты запуска тестов
        description: |-
          - Код написан на языке программирования Java версии 21 или выше.
          - Код написан согласно принципам Clean Code.
          - Тесты находятся в пакете src/test, а код, в свою очередь, в src/main.
          - Над тестами описана аннотация Displayname с читаемым названием, верно передающим то, что происходит в тесте.
          - В файле build.gradle добавлен junit-suite-engine.
          - Созданы 2 тест-сьюта, которые в соответствующих аннотациях содержат различные (а также валидные) пути к запускаемым тестам.
          - Критерии оценивания:
            - Каждое несоблюденное требование — минус один балл.
        rating: "6"

      - name: Задание 5. Реализация кастомного исключения в Java
        description: |-
          - Код написан на языке программирования Java версии 21 или выше.
          - Код написан согласно принципам Clean Code.
          - Тесты находятся в пакете src/test, а код, в свою очередь, в src/main.
          - Над тестами описана аннотация Displayname с читаемым названием, верно передающим то, что происходит в тесте.
          - Кастомное исключение реализовано в папке src/main.
          - Исключение отнаследовано от RuntimeException или его наследников, и название самого исключения соответствует принципам Clean Code.
          - Исключение действительно пробрасывается в блоке catch, который добавлен в первый тест из Задания 3.
          - В выбрасываемом исключении указано кастомное описание ошибки.
          - В репозитории присутствуют файлы с пометками manual-solution (ручная реализация) и ai-assisted-solution (реализация с ИИ)
          - Пир может описать свой опыт использования ИИ в задании ответить на вопросы:
             - Какие были различия между версиями кода? 
             - Какие правки пришлось внести в код на основании рекомендаций ИИ.
             - Какой вариант ты выберешь и почему ты доверяешь конкретным предложениям ИИ? 

          - Критерии оценивания:
            - Каждое несоблюденное требование — минус один балл.
            - Отсутствие файлов с пометкой `manual-solution` - минус 4 балла (задание не считается выполненным корректно)
        rating: "6"

      - name: Задание 6. Другие способы запуска тестов
        description: |-
          - Код написан на языке программирования Java версии 21 или выше.
          - Код написан согласно принципам Clean Code.
          - Тесты находятся в пакете src/test, а код, в свою очередь, в src/main.
          - Над тестами описана аннотация Displayname с читаемым названием, верно передающим то, что происходит в тесте.
          - В файле readme.md описаны команды для запуска двух различных тест-сьютов из Задания 4.
          - При просмотре файла readme.md в preview-режиме скрипты для запуска тестов являются активными кнопками.
          - При запуске тест-сьюта при нажатии на вышеописанную кнопку действительно происходит запуск тестов.
          - Критерии оценивания:
            - Каждое несоблюденное требование — минус один балл.
        rating: "6"

      - name: Задание 7. Знакомство с TestNG
        description: |-
          - Код написан на языке программирования Java версии 21 или выше.
          - Код написан согласно принципам Clean Code.
          - Тесты находятся в пакете src/test, а код, в свою очередь, в src/main.
          - В файле build.gradle присутствуют зависимости для использования testNG.
          - Параметризованные тесты описаны в виде параметра (dataProvider) внутри аннотации Test.
          - Синтаксис использования assertAll описан верно: не лямбдами, как в Junit, а вызовом метода в конце тестового класса и созданием класса assert в Before-методе.
          - Тестовые сьюты описаны в виде xml-файлов.
          - Аннотации Test во всех тестах на TestNG импортируются из соответствующей библиотеки (в импортах наследником аннотации Test является testng).
          - Все тесты, написанные на TestNG, лежат в пакетах с соответствующим именем.
          - Критерии оценивания:
            - Каждые 2 несоблюденных требования — минус один балл.
        rating: "6"
