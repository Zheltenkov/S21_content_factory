<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 Сброс пароля - Генератор учебных проектов</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/auth-light.css?v=20260508-polish-ui">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔑 Сброс пароля</h1>
            <p>Введите новый пароль</p>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <form id="resetForm" onsubmit="handleResetPassword(event)">
            <div class="form-group">
                <label for="token">Токен восстановления</label>
                <input 
                    type="text" 
                    id="token" 
                    name="token" 
                    required 
                    autocomplete="one-time-code"
                    placeholder="Введите токен из email"
                    aria-required="true"
                    aria-invalid="false"
                    aria-describedby="token-error"
                >
                <span id="token-error" class="error-message" role="alert" aria-live="polite" style="display: none;"></span>
            </div>
            
            <div class="form-group">
                <label for="new_password">Новый пароль</label>
                <input 
                    type="password" 
                    id="new_password" 
                    name="new_password" 
                    required
                    minlength="8"
                    autocomplete="new-password"
                    placeholder="Введите новый пароль (минимум 8 символов)"
                    aria-required="true"
                    aria-invalid="false"
                    aria-describedby="password-error"
                >
                <span id="password-error" class="error-message" role="alert" aria-live="polite" style="display: none;"></span>
            </div>
            
            <button type="submit" class="btn" id="resetBtn">Изменить пароль</button>
            
            <div class="auth-actions center">
                <a href="/" class="auth-link">Вернуться к входу</a>
            </div>
        </form>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        const API_URL = `${API_BASE}/api/v1`;
        
        // Получаем токен из URL параметров
        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        if (tokenFromUrl) {
            document.getElementById('token').value = tokenFromUrl;
        }
        
        async function handleResetPassword(event) {
            event.preventDefault();
            
            const btn = document.getElementById('resetBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const token = document.getElementById('token').value.trim();
            const newPassword = document.getElementById('new_password').value;
            
            // Валидация
            let hasErrors = false;
            
            const tokenError = document.getElementById('token-error');
            const tokenField = document.getElementById('token');
            if (!token) {
                tokenField.setAttribute('aria-invalid', 'true');
                tokenField.classList.add('field-error');
                tokenError.textContent = 'Пожалуйста, введите токен';
                tokenError.style.display = 'block';
                hasErrors = true;
            } else {
                tokenField.setAttribute('aria-invalid', 'false');
                tokenField.classList.remove('field-error');
                tokenError.textContent = '';
                tokenError.style.display = 'none';
            }
            
            const passwordError = document.getElementById('password-error');
            const passwordField = document.getElementById('new_password');
            if (!newPassword) {
                passwordField.setAttribute('aria-invalid', 'true');
                passwordField.classList.add('field-error');
                passwordError.textContent = 'Пожалуйста, введите новый пароль';
                passwordError.style.display = 'block';
                hasErrors = true;
            } else if (newPassword.length < 8) {
                passwordField.setAttribute('aria-invalid', 'true');
                passwordField.classList.add('field-error');
                passwordError.textContent = 'Пароль должен содержать минимум 8 символов';
                passwordError.style.display = 'block';
                hasErrors = true;
            } else {
                passwordField.setAttribute('aria-invalid', 'false');
                passwordField.classList.remove('field-error');
                passwordError.textContent = '';
                passwordError.style.display = 'none';
            }
            
            if (hasErrors) {
                return;
            }
            
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            btn.disabled = true;
            btn.textContent = 'Изменение пароля...';
            
            try {
                const response = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        new_password: newPassword
                    })
                });
                
                if (!response.ok) {
                    let errorDetail = 'Ошибка сброса пароля';
                    try {
                        const errorData = await response.json();
                        errorDetail = errorData.detail || errorData.message || `Ошибка ${response.status}`;
                    } catch (e) {
                        errorDetail = `Ошибка ${response.status}: ${response.statusText}`;
                    }
                    throw new Error(errorDetail);
                }
                
                const data = await response.json();
                successMsg.textContent = `${data.message || 'Пароль успешно изменен!'} Перенаправление на страницу входа...`;
                successMsg.classList.add('show');
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
                
            } catch (error) {
                console.error('Ошибка сброса пароля:', error);
                showError(`${error.message || 'Ошибка при сбросе пароля. Попробуйте еще раз.'}`);
                btn.disabled = false;
                btn.textContent = 'Изменить пароль';
            }
        }
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
        }
    </script>
</body>
</html>
