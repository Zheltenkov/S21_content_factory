[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider
markers =
    unit: Unit тесты
    integration: Интеграционные тесты
    slow: Медленные тесты (требуют LLM API)
    asyncio: Асинхронные тесты
